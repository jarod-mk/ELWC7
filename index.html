function UnitForm({ unit, onSave, onCancel, apiKey, onChangeKey }) {
  const [title,      setTitle]      = useState(unit.title);
  const [koreanRaw,  setKoreanRaw]  = useState(unit.koreanFull.join("\n"));
  const [englishFull,setEnglishFull]= useState(unit.englishSentences.join(" "));
  const [sentences,  setSentences]  = useState(
    unit.englishSentences.map((s,i)=>({ en:s, chunks:(unit.koreanChunks[i]||[]).join(" / ") }))
  );
  const [vocab,      setVocab]      = useState(unit.vocab);
  const [aiCandidates,setAiCandidates] = useState([]);
  const [aiLoading,  setAiLoading]  = useState(false);
  const [aiError,    setAiError]    = useState("");
  const [autoMsg,    setAutoMsg]    = useState("");   // 자동배치 완료 메시지
  const [openSec,    setOpenSec]    = useState({ s1:true, s2:true, s3:true, sv:false });
  const toggle = k => setOpenSec(p=>({...p,[k]:!p[k]}));

  /* 칸1+2 → 칸3+4 자동 배치
     · 영어: 마침표/물음표/느낌표 기준으로 문장 분리
     · 한글: 줄바꿈 기준으로 문장 분리
     · 인덱스 순서대로 1:1 매칭
     · 매칭된 한글 문장을 끊어읽기 칸의 초기값으로 설정 (슬래시는 교사가 직접 추가) */
const autoSplit = () => {
    const enTrimmed = englishFull.trim();
    const koTrimmed = koreanRaw.trim();
    if (!enTrimmed) { alert("칸2에 영어 지문을 먼저 입력하세요."); return; }
    if (!koTrimmed) { alert("칸1에 한글 해석을 먼저 입력하세요."); return; }

    // ── 영어 문장 분리: 마침표/물음표/느낌표 기준 ──
    const enSents = (enTrimmed.match(/[^.!?]+[.!?]+["'"\u201d]?/g) || [enTrimmed])
      .map(s => s.trim()).filter(Boolean);

    // ── 한글 문장 분리: 줄바꿈 우선 → 부족하면 마침표 기준으로 재분리 ──
    const koByLine = koTrimmed.split("\n").map(s => s.trim()).filter(Boolean);
    const koByPeriod = (koTrimmed.match(/[^.!?。]+[.!?。]+/g) || [koTrimmed])
      .map(s => s.trim()).filter(Boolean);

    // 줄바꿈 분리 결과가 영어 문장 수에 더 가까우면 줄바꿈, 아니면 마침표 기준 사용
    const diffLine   = Math.abs(koByLine.length   - enSents.length);
    const diffPeriod = Math.abs(koByPeriod.length - enSents.length);
    const koSents = (koByLine.length >= 2 && diffLine <= diffPeriod)
      ? koByLine
      : koByPeriod;

    // ── 1:1 매칭 ──
    const paired = enSents.map((en, i) => ({
      en,
      chunks: i < koSents.length ? koSents[i] : "",
    }));

    setSentences(paired);

    const koMatched = Math.min(koSents.length, enSents.length);
    const splitMethod = (koByLine.length >= 2 && diffLine <= diffPeriod) ? "줄바꿈" : "마침표";
    setAutoMsg(
      "✅ 영어 " + enSents.length + "문장 + 한글 " + koMatched + "문장 배치 완료 (" + splitMethod + " 기준)"
    );
    setTimeout(() => setAutoMsg(""), 4000);
    setOpenSec(p => ({ ...p, s3: true }));
  };

  /* AI 추천 */
  const aiRecommend = async () => {
    if (!englishFull.trim()) { setAiError("먼저 영어 지문(칸2)을 입력하세요."); return; }
    const keyToUse = apiKey || askForGeminiKey(apiKey,onChangeKey);
    if (!keyToUse) { setAiError("Gemini API Key 없이도 직접 추가는 가능합니다."); return; }
    setAiLoading(true); setAiError("");
    try {
      const parsed = await callGeminiJSON(
        keyToUse,
        `다음 영어 지문에서 한국 학생 중2-고3 수준의 주요 단어 5~8개를 추출하라.
- 각 항목의 word는 동사면 동사원형, 명사면 단수형으로 쓴다.
- 각 단어는 한글 뜻 후보 meanings, 영어 유의어 syn, 영어 반의어 ant를 반환한다.
- meanings는 가능한 뜻을 자연스러운 한국어로 최대 4개까지 나열한다.
- 유의어와 반의어는 한국 학생 중2-고3 수준에서 이해 가능한 쉬운 단어를 우선한다.
- 사람들이 실제로 많이 쓰는 순서대로 나열한다.
- 유의어와 반의어는 가능한 경우 최대 4개까지, 없으면 있는 수만 배열한다.
- 마크다운 없이 아래 JSON 형식으로만 반환한다.
{"words":[{"word":"baseword","meanings":["뜻1","뜻2"],"syn":["..."],"ant":["..."]}]}

지문:${englishFull}`,
        1400,
        VOCAB_RESPONSE_SCHEMA
      );
      const candidates = normalizeCandidatePayload(parsed);
      setAiCandidates(candidates);
      setOpenSec(p => ({ ...p, sv:true }));
      if (!candidates.length) setAiError("후보를 생성하지 못했습니다. 지문을 조금 더 길게 입력해 보세요.");
    } catch(e) { setAiError("Gemini 추천 실패. API Key, 무료 티어 한도, 네트워크 상태를 확인하세요."); }
    finally { setAiLoading(false); }
  };

  const toggleCandidate = (word, field, value) => {
    setAiCandidates(prev=>prev.map(c=>{
      if (c.word !== word) return c;
      const cur = c.selected[field] || [];
      const next = cur.includes(value) ? cur.filter(v=>v!==value) : [...cur,value].slice(0,4);
      return { ...c, selected:{ ...c.selected, [field]:next } };
    }));
  };

  const selectAllCandidate = word => {
    setAiCandidates(prev=>prev.map(c=>c.word===word
      ? { ...c, selected:{ meanings:c.meanings.slice(0,4), syn:c.syn.slice(0,4), ant:c.ant.slice(0,4) } }
      : c
    ));
  };

  const applySelectedCandidates = () => {
    const selected = aiCandidates.reduce((acc,c)=>{
      const meanings = c.selected.meanings || [];
      const syn = c.selected.syn || [];
      const ant = c.selected.ant || [];
      if (meanings.length || syn.length || ant.length) {
        acc[c.word] = normalizeVocabData({ ko:meanings.join(", "), syn, ant });
      }
      return acc;
    }, {});
    if (!Object.keys(selected).length) { setAiError("반영할 후보를 먼저 선택하세요."); return; }
    setVocab(prev=>({...prev,...selected}));
    Object.entries(selected).forEach(([word,data])=>setCachedWord(word,data));
    setAiCandidates([]);
    setAiError("");
  };

  const updSent = (i,f,v) => setSentences(p=>p.map((s,j)=>j===i?{...s,[f]:v}:s));
  const addSent = () => setSentences(p=>[...p,{en:"",chunks:""}]);
  const rmSent  = i => setSentences(p=>p.filter((_,j)=>j!==i));
  const updVocab= (w,f,v) => setVocab(p=>({...p,[w]:{...p[w],[f]:v}}));
  const rmVocab = w => setVocab(p=>{ const n={...p}; delete n[w]; return n; });
  const addVocab= () => {
    const w = window.prompt("추가할 영어 단어:");
    if (w && w.trim()) setVocab(p=>({...p,[normalizeWordForLookup(w)]:{ko:"",syn:["","","",""],ant:["","","",""]}}));
  };

  const handleSave = () => {
    if (!title.trim()) { alert("지문 제목을 입력하세요."); return; }
    onSave({ ...unit, title:title.trim(),
      koreanFull:   koreanRaw.split("\n").map(s=>s.trim()).filter(Boolean),
      englishSentences: sentences.map(s=>s.en.trim()).filter(Boolean),
      koreanChunks: sentences.map(s=>s.chunks.split("/").map(c=>c.trim()).filter(Boolean)),
      vocab });
  };

  return (
    <div style={{ paddingBottom:"40px" }}>
      {/* 제목 */}
      <div style={{ marginBottom:"16px" }}>
        <label style={{ fontSize:"11px", fontWeight:700, letterSpacing:"0.15em", color:C.teal, textTransform:"uppercase" }}>지문 제목</label>
        <input value={title} onChange={e=>setTitle(e.target.value)} placeholder="예: 2025 고1 모의고사 20번"
          onKeyDown={e=>e.stopPropagation()} onKeyUp={e=>e.stopPropagation()} onClick={e=>e.stopPropagation()}
          style={{ display:"block", width:"100%", marginTop:"6px", padding:"10px 14px", borderRadius:"12px",
                   background:C.darkCard, border:`1px solid ${C.darkBorder}`, color:C.darkText, fontSize:"14px", outline:"none" }}/>
      </div>

      {/* 칸1 */}
      <div style={{ marginBottom:"12px" }}>
        <SectionCard lbl="칸 1" ttl="한글 해석 전체" sub="문장마다 엔터로 구분  ·  한글 TTS 듣기용" color={C.coral} isOpen={openSec.s1} onToggle={()=>toggle("s1")}>
          <AutoTextarea value={koreanRaw} onChange={setKoreanRaw} minRows={4} maxRows={10}
            placeholder={"많은 사람들은 재능이 타고나는 것이라고 믿는다.\n하지만 연구는 노력이..."}
            style={{ background:"#fffdf8", border:`1px solid ${C.darkBorder}`, color:C.darkText }}/>
          <p style={{ fontSize:"11px", color:"#7b7468", marginTop:"4px" }}>
            {koreanRaw.split("\n").filter(Boolean).length}문장 입력됨
          </p>
        </SectionCard>
      </div>

      {/* 칸2 */}
      <div style={{ marginBottom:"12px" }}>
        <SectionCard lbl="칸 2" ttl="영어 지문 전체" sub="영어 TTS 듣기용  ·  칸1+2 입력 후 아래 버튼으로 칸3+4 자동 배치" color={C.gold} isOpen={openSec.s2} onToggle={()=>toggle("s2")}>
          <AutoTextarea value={englishFull} onChange={setEnglishFull} minRows={4} maxRows={10}
            placeholder="Many people believe that talent is something you are born with. However..."
            style={{ background:"#fffdf8", border:`1px solid ${C.darkBorder}`, color:C.darkText }}/>
          <button onClick={autoSplit}
            style={{ marginTop:"8px", display:"inline-flex", alignItems:"center", gap:"6px",
                     padding:"8px 16px", borderRadius:"10px", background:"#d7f0ec", color:C.teal,
                     border:`1px solid ${C.teal}44`, cursor:"pointer", fontSize:"13px", fontWeight:700 }}>
            <Icon name="Sparkles" size={15} color={C.teal}/>칸1+2 → 칸3+4 자동 배치
          </button>
          <p style={{ fontSize:"11px", color:"#7b7468", marginTop:"6px", lineHeight:"1.6" }}>
            ※ 영어는 마침표 기준, 한글은 줄바꿈 기준으로 1:1 매칭합니다.<br/>
            배치 후 칸3(영어)·칸4(한글)를 자유롭게 수정하고 슬래시(/)로 끊어읽기를 완성하세요.
          </p>
          {autoMsg && (
            <div style={{ marginTop:"8px", padding:"8px 14px", borderRadius:"10px",
                          background:"#d7f0ec", color:C.teal, fontSize:"13px", fontWeight:600 }}>
              {autoMsg}
            </div>
          )}
        </SectionCard>
      </div>

      {/* 칸3 + 4 */}
      <div style={{ marginBottom:"12px" }}>
        <SectionCard lbl="칸 3 + 4" ttl="영어 문장별 입력 & 한글 끊어읽기"
              sub="자동 배치 후 영어 수정 가능 · 끊어읽기에 슬래시(/)로 의미단위 구분" color={C.teal} isOpen={openSec.s3} onToggle={()=>toggle("s3")}>
          <div style={{ display:"flex", flexDirection:"column", gap:"12px" }}>
            {sentences.map((s,i) => (
              <div key={i} style={{ borderRadius:"12px", padding:"12px", background:"#fffdf8", border:`1px solid ${C.darkBorder}` }}>
                {/* 문장 번호 + 삭제 */}
                <div style={{ display:"flex", alignItems:"center", gap:"8px", marginBottom:"8px" }}>
                  <span style={{ fontSize:"11px", fontWeight:700, padding:"2px 8px", borderRadius:"999px",
                    background:C.darkCard, color:C.teal }}>문장 {i+1}</span>
                  <button onClick={()=>rmSent(i)} style={{ marginLeft:"auto", background:"none", border:"none", cursor:"pointer", padding:"2px" }}>
                    <Icon name="Trash2" size={13} color="#7b7468"/>
                  </button>
                </div>

                {/* 칸3: 영어 문장 — 최소 2줄, 최대 5줄 자동 확장 */}
                <AutoTextarea value={s.en} onChange={v=>updSent(i,"en",v)}
                  placeholder="영어 문장을 입력하세요 (긴 문장도 5줄까지 자동 확장됩니다)"
                  minRows={2} maxRows={5}
                  style={{ background:C.darkCard, border:`1px solid ${C.darkBorder}`, color:C.darkText,
                           marginBottom:"8px" }}/>

                {/* 칸4: 한글 끊어읽기 — 최소 2줄, 최대 5줄 자동 확장 */}
                <div style={{ display:"flex", alignItems:"center", gap:"6px", marginBottom:"4px", flexWrap:"wrap" }}>
                  <span style={{ fontSize:"11px", fontWeight:700, color:C.coral }}>↳ 한글 해석 · 끊어읽기</span>
                  <span style={{ fontSize:"11px", color:"#7b7468" }}>
                    {s.chunks ? "슬래시(/)로 의미단위를 직접 구분하세요" : "자동 배치 후 슬래시(/)로 의미단위 구분"}
                  </span>
                  {s.chunks && !s.chunks.includes("/") && (
                    <span style={{ fontSize:"10px", padding:"1px 6px", borderRadius:"999px",
                      background:"#d7f0ec", color:C.teal }}>한글 배치됨 · 슬래시 추가 필요</span>
                  )}
                </div>
                <AutoTextarea value={s.chunks} onChange={v=>updSent(i,"chunks",v)}
                  placeholder="자동 배치된 한글 문장을 슬래시(/)로 끊어주세요. 예) 많은 사람들은 / 믿는다 / 재능이 / 타고나는 것이라고"
                  minRows={2} maxRows={5}
                  style={{ background:C.darkCard, border:`1px solid ${C.coral}55`, color:C.darkText }}/>

                {/* 끊어읽기 미리보기 태그 */}
                {s.chunks && (
                  <div style={{ display:"flex", flexWrap:"wrap", gap:"6px", marginTop:"8px" }}>
                    {s.chunks.split("/").map((c,j)=>c.trim()&&(
                      <span key={j} style={{ padding:"2px 10px", borderRadius:"999px", fontSize:"12px",
                        background:C.coralLight, color:C.coral }}>{c.trim()}</span>
                    ))}
                  </div>
                )}
              </div>
            ))}
            <button onClick={addSent}
              style={{ width:"100%", padding:"10px", borderRadius:"12px", border:`1px dashed ${C.darkBorder}`,
                       background:"none", color:"#7b7468", cursor:"pointer", fontSize:"13px",
                       display:"flex", alignItems:"center", justifyContent:"center", gap:"6px" }}>
              <Icon name="Plus" size={14} color="#7b7468"/>문장 추가
            </button>
          </div>
        </SectionCard>
      </div>

      {/* 단어 사전 */}
      <div style={{ marginBottom:"16px" }}>
        <SectionCard lbl="단어 사전" ttl="유의어 · 반의어" sub="Gemini 무료 티어 추천 후 교사가 검수·수정" color="#8b5cf6" isOpen={openSec.sv} onToggle={()=>toggle("sv")}>
          <div style={{ display:"flex", flexWrap:"wrap", gap:"8px", marginBottom:"12px", alignItems:"center" }}>
            <button onClick={aiRecommend} disabled={aiLoading}
              style={{ display:"inline-flex", alignItems:"center", gap:"6px", padding:"7px 14px",
                       borderRadius:"10px", background:"#2d1a5e", color:"#c4b5fd",
                       border:"none", cursor:aiLoading?"not-allowed":"pointer", fontSize:"13px", fontWeight:600,
                       opacity:aiLoading?0.6:1 }}>
              {aiLoading
                ? <><span className="spin" style={{ display:"inline-block" }}><Icon name="Loader2" size={14} color="#c4b5fd"/></span>AI 추천 중...</>
                : <><Icon name="Wand2" size={14} color="#c4b5fd"/>Gemini 자동 추천</>}
            </button>
            <button onClick={addVocab}
              style={{ display:"inline-flex", alignItems:"center", gap:"6px", padding:"7px 14px",
                       borderRadius:"10px", background:C.darkCard, color:"#7b7468",
                       border:`1px solid ${C.darkBorder}`, cursor:"pointer", fontSize:"13px", fontWeight:600 }}>
              <Icon name="Plus" size={14} color="#7b7468"/>직접 추가
            </button>
            {aiError && <span style={{ fontSize:"12px", color:C.coral }}>{aiError}</span>}
          </div>
          {aiCandidates.length > 0 && (
            <VocabCandidateReview
              candidates={aiCandidates}
              onToggle={toggleCandidate}
              onSelectAll={selectAllCandidate}
              onApply={applySelectedCandidates}
              onCancel={()=>setAiCandidates([])}
            />
          )}
          {!Object.keys(vocab).length && !aiCandidates.length
            ? <p style={{ textAlign:"center", color:"#7b7468", fontSize:"13px", padding:"16px 0" }}>단어가 없습니다. Gemini 추천 또는 직접 추가하세요.</p>
            : Object.keys(vocab).length > 0 && <div style={{ display:"flex", flexDirection:"column", gap:"8px" }}>
                {Object.entries(vocab).map(([word,data])=>(
                  <VocabRow key={word} word={word} data={data}
                    onChange={(f,v)=>updVocab(word,f,v)} onRemove={()=>rmVocab(word)}/>
                ))}
              </div>}
        </SectionCard>
      </div>

      {/* 저장/취소 */}
      <div style={{ display:"flex", gap:"12px" }}>
        <button onClick={onCancel}
          style={{ padding:"10px 20px", borderRadius:"12px", background:C.darkCard,
                   color:"#7b7468", border:`1px solid ${C.darkBorder}`, cursor:"pointer", fontSize:"14px", fontWeight:600 }}>
          취소
        </button>
        <button onClick={handleSave}
          style={{ flex:1, padding:"10px 20px", borderRadius:"12px", background:C.teal,
                   color:"#fff", border:"none", cursor:"pointer", fontSize:"14px", fontWeight:700,
                   display:"flex", alignItems:"center", justifyContent:"center", gap:"6px" }}>
          <Icon name="Save" size={16} color="#fff"/>지문 저장
        </button>
      </div>
    </div>
  );
}

/* ─── VocabCandidateReview ─── */
function VocabCandidateReview({ candidates, onToggle, onSelectAll, onApply, onCancel }) {
  const isSelected = (c, field, value) => (c.selected[field] || []).includes(value);
  const selectedCount = candidates.reduce((sum,c)=>
    sum + (c.selected.meanings||[]).length + (c.selected.syn||[]).length + (c.selected.ant||[]).length, 0);

  const Chip = ({ c, field, value, color }) => {
    const active = isSelected(c, field, value);
    return (
      <button onClick={()=>onToggle(c.word, field, value)}
        style={{ padding:"4px 9px", borderRadius:"8px", fontSize:"12px", fontWeight:600,
                 background:active?color:"#fffdf8", color:active?"#fff":"#7b7468",
                 border:`1px solid ${active?color:C.darkBorder}`, cursor:"pointer" }}>
        {value}
      </button>
    );
  };

  const Column = ({ c, field, label, color, values }) => (
    <div style={{ minWidth:0 }}>
      <p style={{ fontSize:"11px", color, fontWeight:700, margin:"0 0 6px" }}>{label}</p>
      <div style={{ display:"flex", flexWrap:"wrap", gap:"6px" }}>
        {values.length
          ? values.map(v=><Chip key={`${field}-${v}`} c={c} field={field} value={v} color={color}/>)
          : <span style={{ fontSize:"12px", color:"#7b7468" }}>후보 없음</span>}
      </div>
    </div>
  );

  return (
    <div style={{ marginBottom:"14px", padding:"12px", borderRadius:"12px",
                  background:"#fffdf8", border:`1px solid ${C.darkBorder}` }}>
      <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", gap:"10px",
                    marginBottom:"10px", flexWrap:"wrap" }}>
        <div>
          <p style={{ margin:0, color:"#c4b5fd", fontSize:"13px", fontWeight:700 }}>Gemini 후보 검수</p>
          <p style={{ margin:"2px 0 0", color:"#7b7468", fontSize:"11px" }}>
            뜻, 유의어, 반의어 후보를 선택한 뒤 단어장에 반영하세요.
          </p>
        </div>
        <div style={{ display:"flex", gap:"8px", flexWrap:"wrap" }}>
          <button onClick={onCancel}
            style={{ padding:"6px 12px", borderRadius:"10px", background:C.darkCard,
                     color:"#7b7468", border:`1px solid ${C.darkBorder}`, cursor:"pointer", fontSize:"12px", fontWeight:700 }}>
            후보 취소
          </button>
          <button onClick={onApply}
            style={{ padding:"6px 12px", borderRadius:"10px", background:C.teal,
                     color:"#fff", border:"none", cursor:"pointer", fontSize:"12px", fontWeight:700 }}>
            선택 항목 반영 ({selectedCount})
          </button>
        </div>
      </div>

      <div style={{ display:"flex", flexDirection:"column", gap:"10px" }}>
        {candidates.map(c=>(
          <div key={c.word} style={{ padding:"10px", borderRadius:"10px",
                                    background:C.darkCard, border:`1px solid ${C.darkBorder}` }}>
            <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", gap:"8px",
                          marginBottom:"10px", flexWrap:"wrap" }}>
              <span style={{ color:"#c4b5fd", fontWeight:700, fontSize:"14px" }}>{c.word}</span>
              <button onClick={()=>onSelectAll(c.word)}
                style={{ padding:"4px 9px", borderRadius:"8px", background:"#2d1a5e",
                         color:"#c4b5fd", border:"none", cursor:"pointer", fontSize:"11px", fontWeight:700 }}>
                이 단어 전체 선택
              </button>
            </div>
            <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fit,minmax(150px,1fr))",
                          gap:"12px" }}>
              <Column c={c} field="meanings" label="1 뜻 후보" color={C.gold} values={c.meanings}/>
              <Column c={c} field="syn" label="2 유의어" color={C.teal} values={c.syn}/>
              <Column c={c} field="ant" label="3 반의어" color={C.coral} values={c.ant}/>
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

/* ─── VocabRow ─── */
function VocabRow({ word, data, onChange, onRemove }) {
  const [open, setOpen] = useState(false);
  return (
    <div style={{ borderRadius:"12px", overflow:"hidden", border:`1px solid ${C.darkBorder}` }}>
      <div onClick={()=>setOpen(p=>!p)} style={{ display:"flex", alignItems:"center", padding:"8px 12px",
        background:C.darkCard, cursor:"pointer" }}>
        <span style={{ fontWeight:600, fontSize:"13px", color:"#c4b5fd", marginRight:"8px" }}>{word}</span>
        <span style={{ fontSize:"13px", color:C.darkText }}>{data.ko}</span>
        <div style={{ marginLeft:"auto", display:"flex", gap:"8px", alignItems:"center" }}>
          <button onClick={e=>{e.stopPropagation();onRemove();}} style={{ background:"none",border:"none",cursor:"pointer",padding:"2px" }}>
            <Icon name="Trash2" size={13} color={C.coral}/>
          </button>
          <Icon name={open?"ChevronUp":"ChevronDown"} size={14} color="#7b7468"/>
        </div>
      </div>
      {open && (
        <div style={{ padding:"12px", background:"#fffdf8", display:"flex", flexDirection:"column", gap:"8px" }}>
          <input value={data.ko} onChange={e=>onChange("ko",e.target.value)} placeholder="한글 뜻"
            onKeyDown={e=>e.stopPropagation()} onKeyUp={e=>e.stopPropagation()} onClick={e=>e.stopPropagation()}
            style={{ width:"100%", padding:"7px 12px", borderRadius:"8px", fontSize:"13px",
                     background:C.darkCard, border:`1px solid ${C.darkBorder}`, color:C.darkText, outline:"none" }}/>
          {[["syn","유의어",C.teal],["ant","반의어",C.coral]].map(([f,lbl,col])=>(
            <div key={f}>
              <p style={{ fontSize:"11px", color:col, marginBottom:"4px" }}>{lbl} (최대 4개, 콤마 구분)</p>
              <input value={(data[f]||[]).filter(Boolean).join(", ")}
                onChange={e=>onChange(f,e.target.value.split(",").map(s=>s.trim()))}
                onKeyDown={e=>e.stopPropagation()} onKeyUp={e=>e.stopPropagation()} onClick={e=>e.stopPropagation()}
                style={{ width:"100%", padding:"7px 12px", borderRadius:"8px", fontSize:"13px",
                         background:C.darkCard, border:`1px solid ${col}44`, color:C.darkText, outline:"none" }}/>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

/* ════════════════════════════════════════ 학생 모드 ════════════════════════════════════════ */
function StudentMode({ units, selected, selectedAssignment, studentSession, onStudentSession, onSelect, onBack, onHome, speak, speakAll, stop, apiKey, onChangeKey, syncStatus, classroomId, studentLoginMode, allowAiLookup, canSaveVocab, onSaveVocab }) {
  const studentOnly = isStudentSharedMode();
  const requiresStudentLogin = studentOnly || studentLoginMode;
  const recordStepProgress = async (payload) => {
    if (!requiresStudentLogin || !studentSession?.session_token || !selectedAssignment) return;
    await callStudentApi("recordStepProgress", {
      assignment_id:selectedAssignment.id,
      ...payload
    }, studentSession.session_token);
  };
  const recordWordGame = async (payload) => {
    if (!requiresStudentLogin || !studentSession?.session_token || !selectedAssignment) return;
    await callStudentApi("recordWordGame", {
      assignment_id:selectedAssignment.id,
      ...payload
    }, studentSession.session_token);
  };
  const recordAssignmentResult = async (payload) => {
    if (!requiresStudentLogin || !studentSession?.session_token || !selectedAssignment) return;
    await callStudentApi("recordResult", {
      assignment_id:selectedAssignment.id,
      ...payload
    }, studentSession.session_token);
  };

  if (requiresStudentLogin && !selected) {
    return <StudentPortal units={units} classroomId={classroomId} session={studentSession}
      onSession={onStudentSession} onSelect={onSelect}/>;
  }

  if (!selected) return (
    <div style={{ minHeight:"100vh", background:C.cream }}>
      <div style={{ position:"sticky", top:0, zIndex:10, display:"flex", alignItems:"center", gap:"8px",
        padding:"10px 16px", background:C.paper, borderBottom:`1px solid ${C.border}`, flexWrap:"wrap" }}>
        <button onClick={onHome} style={{ background:"none",border:"none",cursor:"pointer",padding:"4px" }}>
          <Icon name="Home" size={18} color={C.teal}/>
        </button>
        <span style={{ fontSize:"13px", fontWeight:600, color:C.teal }}>학생 모드</span>
        <span style={{ fontSize:"11px", color:C.muted }}>교실 {classroomId} · {syncStatus}</span>
      </div>
      <div style={{ maxWidth:"600px", margin:"0 auto", padding:"16px" }}>
        <h2 style={{ fontSize:"17px", fontWeight:700, marginBottom:"16px", color:C.ink }}>지문 선택</h2>
        {!units.length
          ? <p style={{ color:C.muted, fontSize:"14px" }}>교사가 아직 지문을 등록하지 않았습니다.</p>
          : <div style={{ display:"flex", flexDirection:"column", gap:"12px" }}>
              {units.map(u=>(
                <button key={u.id} onClick={()=>onSelect(u)}
                  style={{ textAlign:"left", borderRadius:"16px", padding:"14px 16px",
                           background:C.paper, border:`1px solid ${C.border}`, cursor:"pointer" }}>
                  <p style={{ fontWeight:600, fontSize:"15px", color:C.ink, margin:0 }}>{u.title}</p>
                  <p style={{ fontSize:"12px", color:C.muted, marginTop:"4px" }}>
                    {u.englishSentences.length}문장 · 단어 {Object.keys(u.vocab).length}개
                  </p>
                </button>
              ))}
            </div>}
      </div>
    </div>
  );
  return <GamePlayer unit={selected} speak={speak} speakAll={speakAll} stop={stop}
    onBack={()=>{stop();onBack();}} onHome={()=>{stop();onHome();}} apiKey={apiKey} onChangeKey={onChangeKey}
    allowAiLookup={allowAiLookup} canSaveVocab={canSaveVocab} onSaveVocab={onSaveVocab}
    assignment={selectedAssignment} onStepProgress={recordStepProgress} onWordGameComplete={recordWordGame}
    onAssignmentComplete={recordAssignmentResult}/>;
}

function StudentPortal({ units, classroomId, session, onSession, onSelect }) {
  const [loginCode, setLoginCode] = useState("");
  const [pin, setPin] = useState("");
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState("");
  const [dashboard, setDashboard] = useState(null);
  const [weekBase, setWeekBase] = useState(new Date());
  const [monthBase, setMonthBase] = useState(new Date());
  const [pushMsg, setPushMsg] = useState("");

  const loadDashboard = async (token=session?.session_token) => {
    if (!token) return;
    setLoading(true); setError("");
    try {
      const data = await callStudentApi("dashboard", {}, token);
      setDashboard(data);
    } catch(e) {
      setError("학생 정보를 불러오지 못했습니다. 다시 로그인하세요.");
      onSession(null);
    } finally {
      setLoading(false);
    }
  };

  useEffect(() => { if (session?.session_token) loadDashboard(session.session_token); }, [session?.session_token]);

  const login = async () => {
    setLoading(true); setError("");
    try {
      const data = await callStudentApi("login", {
        classroom_id:classroomId,
        student_code:loginCode.trim().toLowerCase(),
        pin:pin.trim()
      });
      const next = { session_token:data.session_token, expires_at:data.expires_at, student:data.student };
      onSession(next);
      setPin("");
    } catch(e) {
      setError(`로그인 실패: 교실 ${classroomId}의 아이디와 최신 4자리 PIN을 확인하세요. PIN을 초기화했다면 새 PIN만 사용할 수 있습니다.`);
    } finally {
      setLoading(false);
    }
  };

  const logout = () => { onSession(null); setDashboard(null); };

  const enablePush = async () => {
    setPushMsg("");
    try {
      if (!VAPID_PUBLIC_KEY) {
        setPushMsg("푸시 키가 아직 설정되지 않았습니다.");
        return;
      }
      if (!("serviceWorker" in navigator) || !("PushManager" in window) || !("Notification" in window)) {
        setPushMsg("이 브라우저는 PWA 푸시 알림을 지원하지 않습니다.");
        return;
      }
      const permission = await Notification.requestPermission();
      if (permission !== "granted") {
        setPushMsg("알림 권한이 허용되지 않았습니다.");
        return;
      }
      const registration = await navigator.serviceWorker.ready;
      let subscription = await registration.pushManager.getSubscription();
      if (!subscription) {
        subscription = await registration.pushManager.subscribe({
          userVisibleOnly:true,
          applicationServerKey:urlBase64ToUint8Array(VAPID_PUBLIC_KEY)
        });
      }
      await callStudentApi("savePushSubscription", {
        subscription:subscription.toJSON(),
        user_agent:navigator.userAgent
      }, session.session_token);
      setPushMsg("과제 푸시 알림이 켜졌습니다.");
    } catch(e) {
      setPushMsg(`푸시 알림 설정 실패: ${e.message}`);
    }
  };

  if (!session?.session_token) {
    return (
      <div style={{ minHeight:"100vh", display:"flex", alignItems:"center", justifyContent:"center", background:C.cream, padding:"20px" }}>
        <div style={{ width:"100%", maxWidth:"420px", background:C.paper, border:`1px solid ${C.border}`, borderRadius:"18px", padding:"22px" }}>
          <h1 style={{ fontSize:"22px", margin:"0 0 6px", color:C.ink }}>학생 로그인</h1>
          <p style={{ margin:"0 0 18px", color:C.muted, fontSize:"13px" }}>교실 {classroomId} · 교사가 발급한 아이디와 4자리 PIN을 입력하세요.</p>
          <div style={{ display:"grid", gap:"10px" }}>
            <input value={loginCode} onChange={e=>setLoginCode(e.target.value)} placeholder="학생 아이디 예: s001"
              autoCapitalize="none" style={lightInputStyle()}/>
            <input value={pin} onChange={e=>setPin(e.target.value.replace(/\D/g,"").slice(0,4))} placeholder="4자리 PIN"
              inputMode="numeric" type="password" style={lightInputStyle()}/>
            <p style={{ margin:"-4px 0 0", color:C.muted, fontSize:"12px" }}>
              PIN은 앞자리 0이 있어도 포함해서 4자리 모두 입력하세요.
            </p>
            {error && <p style={{ margin:0, color:C.coral, fontSize:"13px" }}>{error}</p>}
            <button onClick={login} disabled={loading || !loginCode.trim() || pin.length!==4}
              style={{ padding:"12px", borderRadius:"12px", background:C.teal, color:"#fff", border:"none",
                cursor:"pointer", fontWeight:800 }}>{loading ? "확인 중..." : "로그인"}</button>
          </div>
        </div>
      </div>
    );
  }

  const student = dashboard?.student || session.student;
  const assignments = dashboard?.assignments || [];
  const results = dashboard?.results || [];
  const stepProgress = dashboard?.step_progress || [];
  const resultByAssignment = Object.fromEntries(results.map(r=>[r.assignment_id, r]));
  const stepByAssignment = stepProgress.reduce((acc,s)=>{
    (acc[s.assignment_id] ||= {})[s.step_no] = s;
    return acc;
  }, {});
  const incompleteAssignments = assignments.filter(a=>!resultByAssignment[a.id]);
  const todayDue = incompleteAssignments.filter(a=>assignmentState(a).key==="due_today").length;
  const tomorrowDue = incompleteAssignments.filter(a=>assignmentState(a).key==="due_tomorrow").length;
  const overdue = incompleteAssignments.filter(a=>assignmentState(a).key==="overdue").length;
  const openAssignment = a => {
    const unit = units.find(u=>String(u.id)===String(a.unit_id));
    if (!unit) {
      alert("이 과제의 지문이 아직 앱에 동기화되지 않았습니다. 잠시 후 다시 시도하세요.");
      return;
    }
    onSelect(unit, a);
  };

  return (
    <div style={{ minHeight:"100vh", background:C.cream }}>
      <div style={{ position:"sticky", top:0, zIndex:10, background:C.paper, borderBottom:`1px solid ${C.border}`,
        padding:"10px 16px", display:"flex", alignItems:"center", justifyContent:"space-between", gap:"10px" }}>
        <div>
          <p style={{ margin:0, fontSize:"13px", fontWeight:800, color:C.teal }}>학생 앱</p>
          <p style={{ margin:"2px 0 0", fontSize:"11px", color:C.muted }}>{student?.student_code} · {student?.display_name || "학생"} · 교실 {classroomId}</p>
        </div>
        <button onClick={logout} style={{ padding:"7px 10px", borderRadius:"9px", border:`1px solid ${C.border}`,
          background:C.paper, color:C.muted, cursor:"pointer", fontSize:"12px", fontWeight:700 }}>로그아웃</button>
      </div>
      <div style={{ maxWidth:"760px", margin:"0 auto", padding:"16px", display:"grid", gap:"14px" }}>
        {error && <p style={{ color:C.coral, fontSize:"13px", margin:0 }}>{error}</p>}
        <section style={lightPanelStyle()}>
          <div style={{ display:"grid", gridTemplateColumns:"repeat(4, minmax(0, 1fr))", gap:"8px" }}>
            <StudentSummaryChip label="미완료" value={incompleteAssignments.length} color={C.muted} bg={C.cream}/>
            <StudentSummaryChip label="오늘 마감" value={todayDue} color={C.coral} bg={C.coralLight}/>
            <StudentSummaryChip label="내일 마감" value={tomorrowDue} color="#2563eb" bg="#dbeafe"/>
            <StudentSummaryChip label="지각 가능" value={overdue} color="#a16207" bg="#fef3c7"/>
          </div>
          <div style={{ marginTop:"10px", display:"flex", justifyContent:"space-between", alignItems:"center", gap:"8px", flexWrap:"wrap" }}>
            <p style={{ margin:0, color:C.muted, fontSize:"12px" }}>설치형 앱에서 과제 알림을 받을 수 있습니다.</p>
            <button onClick={enablePush} style={{ padding:"7px 10px", borderRadius:"9px", border:`1px solid ${C.border}`,
              background:C.paper, color:C.teal, cursor:"pointer", fontSize:"12px", fontWeight:800 }}>푸시 알림 허용</button>
          </div>
          {pushMsg && <p style={{ margin:"8px 0 0", color:pushMsg.includes("실패")||pushMsg.includes("아직")?C.coral:C.teal, fontSize:"12px" }}>{pushMsg}</p>}
        </section>
        <section style={lightPanelStyle()}>
          <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:"12px", gap:"8px" }}>
            <h2 style={{ margin:0, fontSize:"18px", color:C.ink }}>오늘의 과제</h2>
            <button onClick={()=>loadDashboard()} style={{ padding:"6px 10px", borderRadius:"8px", border:`1px solid ${C.border}`,
              background:C.paper, color:C.muted, cursor:"pointer", fontSize:"12px", fontWeight:700 }}>{loading ? "동기화 중" : "새로고침"}</button>
          </div>
          {!assignments.length ? <p style={{ color:C.muted, fontSize:"14px" }}>아직 배정된 과제가 없습니다.</p> : (
            <div style={{ display:"grid", gap:"10px" }}>
              {assignments.map(a=>{
                const r = resultByAssignment[a.id];
                const state = assignmentState(a, r);
                return (
                  <div key={a.id} style={{ borderRadius:"14px", border:`1px solid ${C.border}`, padding:"12px", background:C.paper }}>
                    <div style={{ display:"flex", justifyContent:"space-between", gap:"10px", alignItems:"flex-start" }}>
                      <div>
                        <p style={{ margin:0, fontWeight:800, color:C.ink }}>{a.title}</p>
                        <p style={{ margin:"4px 0 0", fontSize:"12px", color:C.muted }}>마감 {a.due_at ? new Date(a.due_at).toLocaleString() : "없음"}</p>
                        <p style={{ margin:"6px 0 0", display:"inline-block", padding:"4px 7px", borderRadius:"999px",
                          background:state.bg, color:state.color, fontSize:"11px", fontWeight:800 }}>
                          {r ? `${resultStatusText(r)} · ${formatMinutes(r.duration_seconds)} · 성공률 ${r.score}%` : state.label}
                        </p>
                        <div style={{ display:"flex", gap:"5px", flexWrap:"wrap", marginTop:"7px" }}>
                          {[["1","해석"],["2","영어"],["3","단어"]].map(([no,label])=>{
                            const sp = stepByAssignment[a.id]?.[Number(no)];
                            const done = !!sp?.is_completed;
                            const text = Number(no)===3 && done && sp.score !== null && sp.score !== undefined ? `${label} ${sp.score}%` : `${label} ${done ? "완료" : "미완료"}`;
                            return <span key={no} style={{ padding:"3px 6px", borderRadius:"999px", background:done?C.tealLight:C.cream,
                              color:done?C.teal:C.muted, fontSize:"10px", fontWeight:800 }}>{text}</span>;
                          })}
                        </div>
                      </div>
                      <button onClick={()=>openAssignment(a)} style={{ padding:"8px 12px", borderRadius:"10px", background:r?state.bg:C.teal,
                        color:r?state.color:"#fff", border:"none", cursor:"pointer", fontWeight:800 }}>{r ? "다시 하기" : "시작"}</button>
                    </div>
                  </div>
                );
              })}
            </div>
          )}
        </section>
        <StudentLightCalendar title="주간 캘린더" days={getWeekDays(weekBase)} results={results} assignments={assignments} base={weekBase}
          onPrev={()=>setWeekBase(addDays(weekBase,-7))} onNext={()=>setWeekBase(addDays(weekBase,7))}/>
        <StudentLightCalendar title={`${monthBase.getFullYear()}년 ${monthBase.getMonth()+1}월 성과 달력`} days={getMonthDays(monthBase)} results={results} assignments={assignments} base={monthBase}
          month onPrev={()=>setMonthBase(new Date(monthBase.getFullYear(), monthBase.getMonth()-1, 1))}
          onNext={()=>setMonthBase(new Date(monthBase.getFullYear(), monthBase.getMonth()+1, 1))}/>
      </div>
    </div>
  );
}

function StudentSummaryChip({ label, value, color, bg }) {
  return (
    <div style={{ borderRadius:"12px", padding:"10px 8px", background:bg, textAlign:"center", minHeight:"64px" }}>
      <p style={{ margin:0, color, fontSize:"20px", fontWeight:900 }}>{value}</p>
      <p style={{ margin:"2px 0 0", color, fontSize:"11px", fontWeight:800 }}>{label}</p>
    </div>
  );
}

function StudentLightCalendar({ title, days, results, base, onPrev, onNext, month=false, assignments=[] }) {
  const rowsByDate = results.reduce((acc,r)=>{
    const key = toLocalDateKey(r.last_completed_at);
    (acc[key] ||= []).push(r);
    return acc;
  }, {});
  const resultByAssignment = Object.fromEntries(results.map(r=>[r.assignment_id, r]));
  return (
    <section style={lightPanelStyle()}>
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:"12px" }}>
        <h2 style={{ margin:0, fontSize:"18px", color:C.ink }}>{title}</h2>
        <div style={{ display:"flex", gap:"6px" }}>
          <button onClick={onPrev} style={lightMiniBtn()}>이전</button>
          <button onClick={onNext} style={lightMiniBtn()}>다음</button>
        </div>
      </div>
      <div style={{ overflowX:month?"visible":"auto", paddingBottom:month?0:"6px" }}>
        <div style={{
          display:"grid",
          gridTemplateColumns:month ? "repeat(7, minmax(0, 1fr))" : "repeat(7, minmax(132px, 1fr))",
          gap:"7px",
          minWidth:month ? "0" : "924px"
        }}>
          {days.map((day,i)=>{
            const key = toLocalDateKey(day);
            const rows = rowsByDate[key] || [];
            const dueRows = (assignments || []).filter(a => a.due_at && toLocalDateKey(a.due_at) === key && !resultByAssignment[a.id]);
            return (
              <div key={key} style={{ minHeight:month?"82px":"108px", borderRadius:"10px", border:`1px solid ${C.border}`,
                background:C.cream, padding:"7px", overflow:"hidden" }}>
                <p style={{ margin:"0 0 5px", fontSize:"12px", fontWeight:800, color:C.ink }}>{month ? day.getDate() : `${["월","화","수","목","금","토","일"][i]} ${day.getDate()}`}</p>
                <p style={{ margin:"0 0 5px", fontSize:"10px", color:C.muted }}>{rows.length}개 완료 · {dueRows.length}개 미완료</p>
                {dueRows.slice(0, month?1:2).map(a=>{
                  const state = assignmentState(a);
                  return <div key={a.id} style={{ marginBottom:"4px", padding:"4px 5px", borderRadius:"7px",
                    background:state.bg, color:state.color, fontSize:"10px", fontWeight:800, lineHeight:1.25 }}>{shortTitle(a.title)} 미완료</div>;
                })}
                {rows.slice(0, month?2:4).map(r=>{
                  const tone = scoreTone(r.score);
                  return <div key={r.assignment_id} style={{ marginBottom:"4px", padding:"4px 5px", borderRadius:"7px",
                    background:tone.bg, color:tone.color, fontSize:"10px", fontWeight:800, lineHeight:1.25 }}>{shortTitle(r.title)} {r.is_late ? "지각" : "완료"}</div>;
                })}
              </div>
            );
          })}
        </div>
      </div>
    </section>
  );
}

function lightInputStyle(extra={}) {
  return { width:"100%", padding:"12px", borderRadius:"12px", border:`1px solid ${C.border}`,
    background:C.paper, color:C.ink, outline:"none", ...extra };
}

function lightPanelStyle() {
  return { background:C.paper, border:`1px solid ${C.border}`, borderRadius:"18px", padding:"16px" };
}

function lightMiniBtn() {
  return { padding:"6px 10px", borderRadius:"8px", border:`1px solid ${C.border}`,
    background:C.paper, color:C.muted, cursor:"pointer", fontSize:"12px", fontWeight:700 };
}

/* ════════════════════════════════════════ 게임 플레이어 ════════════════════════════════════════ */
function GamePlayer({ unit, speak, speakAll, stop, onBack, onHome, apiKey, onChangeKey, allowAiLookup, canSaveVocab, onSaveVocab, assignment=null, onStepProgress=null, onWordGameComplete=null, onAssignmentComplete=null }) {
  const [step, setStep] = useState(1);
  const [stepDone, setStepDone] = useState({});
  const [wordGameSummary, setWordGameSummary] = useState(null);
  const startedAtRef = useRef(new Date().toISOString());
  const go = s => { stop(); setStep(s); };
  const requiresStepCompletion = !!assignment;
  const markStep = async (stepNo, payload={}) => {
    setStepDone(prev=>({ ...prev, [stepNo]:true }));
    try {
      await onStepProgress?.({
        step_no:stepNo,
        started_at:startedAtRef.current,
        is_completed:true,
        progress_ratio:1,
        ...payload
      });
    } catch(e) {
      console.warn("step progress save failed", e);
    }
  };
  const finishWordGame = async (summary) => {
    setWordGameSummary(summary);
    setStepDone(prev=>({ ...prev, 3:true }));
    try { await onWordGameComplete?.(summary); }
    catch(e) { console.warn("word game save failed", e); }
  };
  const steps = [
    {n:1,label:"한글 듣기",icon:"Headphones"},
    {n:2,label:"영어 듣기",icon:"Headphones"},
    {n:3,label:"단어 게임",icon:"BookOpen"},
    {n:4,label:"독해 배열",icon:"ListOrdered"},
  ];
  return (
    <div style={{ minHeight:"100vh", background:C.cream }}>
      <div style={{ position:"sticky", top:0, zIndex:10, background:C.paper, borderBottom:`1px solid ${C.border}` }}>
        <div style={{ display:"flex", alignItems:"center", gap:"8px", padding:"10px 16px" }}>
          <button onClick={onBack} style={{ background:"none",border:"none",cursor:"pointer",padding:"4px" }}>
            <Icon name="ArrowLeft" size={16} color={C.muted}/>
          </button>
          <p style={{ fontSize:"13px", fontWeight:600, color:C.ink, margin:0, overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>{unit.title}</p>
        </div>
        <div style={{ display:"flex", gap:"6px", padding:"0 16px 10px", overflowX:"auto" }}>
          {steps.map(({n,label,icon})=>(
            <div key={n} style={{ display:"inline-flex", alignItems:"center", gap:"5px",
              padding:"4px 10px", borderRadius:"999px", fontSize:"12px", fontWeight:600, flexShrink:0,
              background:step===n?C.teal:"transparent", color:step===n?"#fff":C.muted,
              border:step===n?"none":`1px solid ${C.border}` }}>
              <Icon name={icon} size={12} color={step===n?"#fff":C.muted}/>{label}
            </div>
          ))}
        </div>
      </div>
      <div style={{ maxWidth:"600px", margin:"0 auto", padding:"16px" }}>
        <div style={{ borderRadius:"20px", padding:"20px", background:C.paper, border:`1px solid ${C.border}` }}>
          {step===1 && <GameStep1 unit={unit} speakAll={speakAll} stop={stop} onComplete={(payload)=>markStep(1,payload)}
            requireComplete={requiresStepCompletion} completed={!!stepDone[1]} onNext={()=>go(2)}/>}
          {step===2 && <GameStep2 unit={unit} speakAll={speakAll} stop={stop} onComplete={(payload)=>markStep(2,payload)}
            requireComplete={requiresStepCompletion} completed={!!stepDone[2]} onPrev={()=>go(1)} onNext={()=>go(3)}/>}
          {step===3 && <GameStep3 unit={unit} speak={speak} onPrev={()=>go(2)} onNext={()=>go(4)}
            apiKey={apiKey} onChangeKey={onChangeKey} allowAiLookup={allowAiLookup}
            canSaveVocab={canSaveVocab} onSaveVocab={onSaveVocab} requireCardGame={requiresStepCompletion}
            onWordGameComplete={finishWordGame}/>}
          {step===4 && <GameStep4 unit={unit} speak={speak} onPrev={()=>go(3)} onRestart={()=>go(1)}
            assignment={assignment} startedAt={startedAtRef.current} wordGameSummary={wordGameSummary}
            onAssignmentComplete={onAssignmentComplete}/>}
        </div>
      </div>
    </div>
  );
}

function SecTitle({ icon, sub, children }) {
  return (
    <div style={{ marginBottom:"12px" }}>
      <p style={{ fontSize:"10px", fontWeight:700, letterSpacing:"0.15em", color:C.coral, textTransform:"uppercase", margin:0 }}>{sub}</p>
      <h2 style={{ fontSize:"19px", fontWeight:700, display:"flex", alignItems:"center", gap:"8px", marginTop:"2px" }}>
        <Icon name={icon} size={20} color={C.teal}/>{children}
      </h2>
    </div>
  );
}

/* ── Step 1 ── */
function GameStep1({ unit, speakAll, stop, onComplete, requireComplete=false, completed=false, onNext }) {
  const [active, setActive] = useState(-1);
  const [playing, setPlaying] = useState(false);
  const [done, setDone] = useState(completed);
  const [msg, setMsg] = useState("");
  const playAll = async () => {
    const started = new Date().toISOString();
    setPlaying(true);
    const ok = await speakAll(unit.koreanFull, "ko-KR", setActive);
    setActive(-1);
    setPlaying(false);
    if (!ok) {
      setMsg("끝까지 재생하지 못했습니다.");
      alert(TTS_HELP_MESSAGE);
      return;
    }
    setDone(true);
    setMsg("해석듣기 완료");
    await onComplete?.({ started_at:started, total_items:unit.koreanFull.length, correct_items:unit.koreanFull.length, raw:{ lines:unit.koreanFull.length } });
  };
  return (
    <div>
      <SecTitle icon="Headphones" sub="STEP 1">한글 지문 전체 듣기</SecTitle>
      <p style={{ fontSize:"13px", color:C.muted, marginBottom:"16px" }}>먼저 한글로 전체 내용을 들으며 문맥을 파악하세요.</p>
      <div style={{ marginBottom:"20px" }}>
        {unit.koreanFull.map((s,i)=>(
          <p key={i} style={{ padding:"8px 12px", borderRadius:"10px", fontSize:"15px", lineHeight:"1.6", marginBottom:"4px", transition:"all 0.2s",
            background:active===i?C.tealLight:"transparent", color:active===i?C.teal:C.ink, fontWeight:active===i?600:400 }}>{s}</p>
        ))}
      </div>
      <div style={{ display:"flex", gap:"8px", flexWrap:"wrap" }}>
        <Btn primary onClick={playAll} disabled={playing}><Icon name="Volume2" size={15} color="#fff"/>{playing?"재생 중...":"전체 듣기"}</Btn>
        <Btn onClick={playAll} disabled={playing}><Icon name="Repeat" size={15} color={C.ink}/>반복 듣기</Btn>
        <Btn ghost disabled={requireComplete && !done} onClick={()=>{stop();onNext();}}>넘어가기 <Icon name="ArrowRight" size={15} color={C.coral}/></Btn>
      </div>
      {requireComplete && !done && <p style={{ margin:"10px 0 0", fontSize:"12px", color:C.coral }}>끝까지 들으면 다음 단계로 넘어갈 수 있습니다.</p>}
      {msg && <p style={{ margin:"10px 0 0", fontSize:"12px", color:done?C.teal:C.coral, fontWeight:700 }}>{msg}</p>}
    </div>
  );
}

/* ── Step 2 ── */
function GameStep2({ unit, speakAll, stop, onComplete, requireComplete=false, completed=false, onPrev, onNext }) {
  const [active, setActive] = useState(-1);
  const [playing, setPlaying] = useState(false);
  const [done, setDone] = useState(completed);
  const [msg, setMsg] = useState("");
  const playAll = async () => {
    const started = new Date().toISOString();
    setPlaying(true);
    const ok = await speakAll(unit.englishSentences, "en-US", setActive);
    setActive(-1);
    setPlaying(false);
    if (!ok) {
      setMsg("끝까지 재생하지 못했습니다.");
      alert(TTS_HELP_MESSAGE);
      return;
    }
    setDone(true);
    setMsg("영어듣기 완료");
    await onComplete?.({ started_at:started, total_items:unit.englishSentences.length, correct_items:unit.englishSentences.length, raw:{ lines:unit.englishSentences.length } });
  };
  return (
    <div>
      <SecTitle icon="Headphones" sub="STEP 2">영어 지문 전체 듣기</SecTitle>
      <p style={{ fontSize:"13px", color:C.muted, marginBottom:"16px" }}>영어 원문을 한 문장씩 들어보세요.</p>
      <div style={{ marginBottom:"20px" }}>
        {unit.englishSentences.map((s,i)=>(
          <p key={i} style={{ padding:"8px 12px", borderRadius:"10px", fontSize:"15px", lineHeight:"1.6", marginBottom:"4px", transition:"all 0.2s",
            background:active===i?C.coralLight:"transparent", color:active===i?C.coral:C.ink, fontWeight:active===i?600:400 }}>{s}</p>
        ))}
      </div>
      <div style={{ display:"flex", gap:"8px", flexWrap:"wrap" }}>
        <Btn primary onClick={playAll} disabled={playing}><Icon name="Volume2" size={15} color="#fff"/>{playing?"재생 중...":"듣기"}</Btn>
        <Btn onClick={()=>{stop();onPrev();}}>이전</Btn>
        <Btn ghost disabled={requireComplete && !done} onClick={()=>{stop();onNext();}}>넘어가기 <Icon name="ArrowRight" size={15} color={C.coral}/></Btn>
      </div>
      {requireComplete && !done && <p style={{ margin:"10px 0 0", fontSize:"12px", color:C.coral }}>끝까지 들으면 다음 단계로 넘어갈 수 있습니다.</p>}
      {msg && <p style={{ margin:"10px 0 0", fontSize:"12px", color:done?C.teal:C.coral, fontWeight:700 }}>{msg}</p>}
    </div>
  );
}

/* ── Step 3 ── */
function GameStep3({ unit, speak, onPrev, onNext, apiKey, onChangeKey, allowAiLookup, canSaveVocab, onSaveVocab, teacherSetupMode=false, requireCardGame=false, onWordGameComplete=null }) {
  const [si, setSi]     = useState(0);
  const [pool, setPool] = useState([]);
  const [sel, setSel]   = useState(null);
  const [wordEdit, setWordEdit] = useState("");
  const [cache, setCache] = useState(()=>readWordCache());     // AI로 즉석 생성한 단어 데이터 캐시
  const [loading, setLoading] = useState(false);
  const [savedNotice, setSavedNotice] = useState("");
  const [phraseMode, setPhraseMode] = useState(false);
  const [phraseParts, setPhraseParts] = useState([]);
  const [phraseText, setPhraseText] = useState("");
  const [phraseKo, setPhraseKo] = useState("");
  const [phraseSyn, setPhraseSyn] = useState("");
  const [phraseAnt, setPhraseAnt] = useState("");
  const [phraseNote, setPhraseNote] = useState("");
  const [phraseLoading, setPhraseLoading] = useState(false);
  const [editingPhraseKey, setEditingPhraseKey] = useState("");
  const [cardQueue, setCardQueue] = useState([]);
  const [cardIndex, setCardIndex] = useState(0);
  const [cardFeedback, setCardFeedback] = useState(null);
  const [wordAttempts, setWordAttempts] = useState([]);
  const [tapRecords, setTapRecords] = useState([]);
  const [wordGameSaved, setWordGameSaved] = useState(false);

  const sent = unit.englishSentences[si]||"";
  const tokens = tokenizeEnglishWords(sent);
  const lookupKey = (w,i) => normalizeWordForLookup(w, unit.vocab, cache, { prev:tokens[i-1], next:tokens[i+1] });
  const tokenKeys = tokens.map((w,i)=>lookupKey(w,i));
  const tokenOrder = tokenKeys.reduce((acc,k,i) => {
    if (k && acc[k] === undefined) acc[k] = i;
    return acc;
  }, {});

  // 사전(교사 등록) 우선, 없으면 캐시(AI 생성) 사용
  const getData = k => unit.vocab[k] || cache[k] || null;
  const lookup  = (w,i) => getData(lookupKey(w,i));
  useEffect(() => { setWordEdit(sel || ""); }, [sel]);
  const partsForPhrase = (key, data) => Array.isArray(data?.parts) && data.parts.length
    ? data.parts.map(normalizeVocabKey).filter(Boolean)
    : String(key || "").split(/\s+/).map(normalizeVocabKey).filter(Boolean);
  const phraseAppearsInSentence = parts => {
    if (!parts.length || parts.length > tokenKeys.length) return false;
    for (let i=0;i<=tokenKeys.length-parts.length;i++) {
      if (parts.every((p,j)=>tokenKeys[i+j] === p)) return true;
    }
    return false;
  };
  const relatedPhrasesForWord = k => Object.entries(unit.vocab || {})
    .filter(([key,data]) => data?.type === "phrase" || key.includes(" "))
    .filter(([key,data]) => {
      const parts = partsForPhrase(key,data);
      return parts.includes(k) && phraseAppearsInSentence(parts);
    })
    .map(([key])=>key);
  const orderPhraseParts = parts => [...new Set(parts)]
    .sort((a,b)=>(tokenOrder[a] ?? 999) - (tokenOrder[b] ?? 999));
  const parseList = text => String(text || "").split(",").map(s=>s.trim()).filter(Boolean).slice(0,4);
  const buildSentenceCards = () => {
    const tapped = pool.filter(k => !String(k).includes(" ") && firstMeaning(getData(k)));
    const difficult = vocabEntriesForSentence(unit, sent, cache).filter(k => !String(k).includes(" "));
    const keys = [...new Set([...tapped, ...difficult])].slice(0,4);
    return keys.map((word, idx) => ({
      word,
      card_index:idx,
      correct_meaning:firstMeaning(getData(word)),
      choices:makeMeaningChoices(unit, word, cache)
    })).filter(c => c.correct_meaning && c.choices.length);
  };
  const resetCardRound = () => {
    setCardIndex(0);
    setCardFeedback(null);
  };
  useEffect(() => {
    if (teacherSetupMode || !requireCardGame) return;
    if (cardIndex === 0 && !cardFeedback) setCardQueue(buildSentenceCards());
  }, [si, pool.join("|"), Object.keys(cache).length, requireCardGame, teacherSetupMode]);

  const resetPhraseDraft = () => {
    setPhraseParts([]);
    setPhraseText("");
    setPhraseKo("");
    setPhraseSyn("");
    setPhraseAnt("");
    setPhraseNote("");
    setEditingPhraseKey("");
  };
  const togglePhrasePart = (k) => {
    setSavedNotice("");
    setPhraseParts(prev => {
      const next = prev.includes(k) ? prev.filter(x=>x!==k) : orderPhraseParts([...prev, k]);
      setPhraseText(next.join(" "));
      return next;
    });
  };
  const startPhraseMode = () => {
    setPhraseMode(true);
    setSavedNotice("");
    if (!phraseParts.length) setPhraseText("");
  };
  const stopPhraseMode = () => {
    setPhraseMode(false);
    resetPhraseDraft();
  };
  const loadSelectedPhraseForEdit = () => {
    if (!sel || !d) return;
    setPhraseMode(true);
    const parts = Array.isArray(d.parts) && d.parts.length ? d.parts : sel.split(/\s+/).filter(Boolean);
    setPhraseParts(orderPhraseParts(parts));
    setPhraseText(sel);
    setPhraseKo(d.ko || "");
    setPhraseSyn((d.syn || []).filter(Boolean).join(", "));
    setPhraseAnt((d.ant || []).filter(Boolean).join(", "));
    setPhraseNote(d.note || "");
    setEditingPhraseKey(sel);
    setSavedNotice("");
  };
  const recommendPhrase = async () => {
    const expr = normalizeVocabKey(phraseText);
    if (!expr) { alert("먼저 표현을 입력하세요."); return; }
    const keyToUse = apiKey || askForGeminiKey(apiKey,onChangeKey);
    if (!keyToUse) return;
    setPhraseLoading(true);
    try {
      const parsed = await callGeminiJSON(
        keyToUse,
        `영어 표현 "${expr}"의 정보를 아래 JSON으로만 반환하라(마크다운/설명 없이).
- 이 표현은 단어 하나가 아니라 구동사, 숙어, 또는 고정 표현일 수 있다.
- word는 반드시 "${expr}"로 쓴다.
- meanings는 한국 학생 중2-고3 수준에서 이해 가능한 자연스러운 한글 뜻을 최대 4개까지 나열한다.
- syn은 바꿔 쓸 수 있는 쉬운 영어 표현을 많이 쓰는 순서로 최대 4개까지 나열한다.
- ant는 반대 표현이 자연스럽게 있으면 최대 4개까지, 없으면 빈 배열로 둔다.
{"words":[{"word":"${expr}","meanings":["뜻1"],"syn":["..."],"ant":["..."]}]}`,
        700,
        VOCAB_RESPONSE_SCHEMA
      );
      const found = normalizeCandidatePayload(parsed)[0];
      if (!found) throw new Error("NO_PHRASE_RESULT");
      setPhraseKo(found.meanings.join(", "));
      setPhraseSyn(found.syn.join(", "));
      setPhraseAnt(found.ant.join(", "));
    } catch(e) {
      alert("표현 뜻을 불러오지 못했습니다. 직접 입력해 주세요.");
    } finally {
      setPhraseLoading(false);
    }
  };
  const savePhrase = () => {
    const key = normalizeVocabKey(phraseText);
    const ko = phraseKo.trim();
    if (phraseParts.length < 2) { alert("표현으로 묶을 단어를 2개 이상 선택하세요."); return; }
    if (!key) { alert("표현을 입력하세요."); return; }
    if (!ko) { alert("한글 뜻을 입력하세요."); return; }
    if (unit.vocab?.[key] && editingPhraseKey !== key && !window.confirm("이미 저장된 표현입니다. 수정해서 덮어쓸까요?")) return;
    const ok = onSaveVocab?.(unit.id, key, {
      ko,
      syn: parseList(phraseSyn),
      ant: parseList(phraseAnt),
      type:"phrase",
      parts:phraseParts,
      note:phraseNote.trim()
    }, editingPhraseKey);
    if (ok) {
      setPool(prev=>prev.includes(key) ? prev : [...prev, key]);
      setSel(key);
      setSavedNotice(`${key} 저장됨`);
      setPhraseMode(false);
      resetPhraseDraft();
    } else {
      setSavedNotice("표현 저장 실패");
    }
  };

  // AI로 단어 데이터 생성
  const fetchWord = async (word) => {
    const cached = getCachedWord(word);
    if (cached) {
      setCache(prev=>({ ...prev, [word]: cached }));
      return;
    }
    if (!allowAiLookup) {
      setCache(prev=>({ ...prev, [word]: { ko:"(교사 단어장에 등록되지 않은 단어입니다)", syn:[], ant:[] } }));
      return;
    }
    const keyToUse = apiKey || askForGeminiKey(apiKey,onChangeKey);
    if (!keyToUse) {
      setCache(prev=>({ ...prev, [word]: { ko:"(교사 단어장에 등록되지 않은 단어입니다)", syn:[], ant:[] } }));
      return;
    }
    setLoading(true);
    try {
      const parsed = await callGeminiJSON(
        keyToUse,
        `영어 단어 "${word}"의 정보를 아래 JSON으로만 반환하라(마크다운/설명 없이).
- words 배열에는 1개 항목만 넣는다.
- word는 "${word}"가 동사면 동사원형, 명사면 단수형으로 쓴다.
- meanings는 가능한 한글 뜻을 자연스러운 한국어로 최대 4개까지 나열한다.
- 한국 학생 중2-고3 수준에서 이해 가능한 쉬운 영어 유의어와 반의어를 우선한다.
- 사람들이 실제로 많이 쓰는 순서대로 나열한다.
- 유의어와 반의어는 가능한 경우 최대 4개까지, 없으면 있는 수만 배열한다.
{"words":[{"word":"${word}","meanings":["뜻1"],"syn":["..."],"ant":["..."]}]}`,
        700,
        VOCAB_RESPONSE_SCHEMA
      );
      const found = normalizeCandidatePayload(parsed)[0];
      const normalized = normalizeVocabData(found ? { ko:found.meanings.join(", "), syn:found.syn, ant:found.ant } : parsed);
      setCache(prev=>({ ...prev, [word]: normalized }));
      setCachedWord(word, normalized);
    } catch(e) {
      // 실패 시 최소 데이터라도 표시
      setCache(prev=>({ ...prev, [word]: { ko:"(Gemini에서 뜻을 불러오지 못했습니다)", syn:[], ant:[] } }));
    } finally { setLoading(false); }
  };

  const tapWord = (w,i) => {
    const k=lookupKey(w,i);
    if(!k) return;
    speak(k,"en-US");
    if (requireCardGame && !teacherSetupMode) {
      setTapRecords(prev => prev.some(r=>r.sentence_index===si && r.word===k)
        ? prev
        : [...prev, { sentence_index:si, word:k }]);
    }
    const phraseKeys = relatedPhrasesForWord(k);
    setPool(prev => {
      const next = [...prev];
      [k, ...phraseKeys].forEach(item => {
        if (item && !next.includes(item)) next.push(item);
      });
      return next;
    });
  };

  const selPool = async (k) => {
    setSel(k);
    setSavedNotice("");
    speak(k,"en-US");
    // 사전에도 없고 캐시에도 없으면 AI 생성
    if (!unit.vocab[k] && !cache[k]) {
      await fetchWord(k);
    }
  };

  const currentCard = cardQueue[cardIndex] || null;
  const needsCardGame = requireCardGame && !teacherSetupMode;
  const sentenceCardDone = !needsCardGame || !cardQueue.length || (cardFeedback && cardIndex >= cardQueue.length - 1);
  const finishWordGameIfNeeded = async () => {
    if (!needsCardGame || wordGameSaved) return;
    const total = wordAttempts.length;
    const correct = wordAttempts.filter(a=>a.is_correct).length;
    const score = total ? Math.round((correct/total)*100) : 0;
    const summary = {
      attempts:wordAttempts,
      tapped_words:tapRecords,
      score,
      total_items:total,
      correct_items:correct,
      raw:{
        sentence_count:unit.englishSentences.length,
        tapped_count:tapRecords.length,
        attempts_count:total
      }
    };
    setWordGameSaved(true);
    try { await onWordGameComplete?.(summary); }
    catch(e) { console.warn("word game save failed", e); }
  };
  const chooseMeaning = async (choice) => {
    if (!currentCard || cardFeedback) return;
    const ok = choice === currentCard.correct_meaning;
    const attempt = {
      sentence_index:si,
      card_index:cardIndex,
      word:currentCard.word,
      selected_meaning:choice,
      correct_meaning:currentCard.correct_meaning,
      is_correct:ok,
      tapped_words:pool.filter(k=>!String(k).includes(" ")),
      choices:currentCard.choices
    };
    setWordAttempts(prev=>[...prev, attempt]);
    setCardFeedback({ ok, choice });
    await speak(ok ? "정답이에요" : "오답이에요", "ko-KR");
  };
  const nextCard = () => {
    if (cardIndex < cardQueue.length - 1) {
      setCardIndex(cardIndex + 1);
      setCardFeedback(null);
    }
  };
  const next = async () => {
    if (needsCardGame && !sentenceCardDone) {
      alert("이 문장의 단어 카드 게임을 먼저 끝내세요.");
      return;
    }
    if (si<unit.englishSentences.length-1) {
      setSi(si+1);
      setPool([]);
      setSel(null);
      setPhraseMode(false);
      resetPhraseDraft();
      setCardQueue([]);
      resetCardRound();
    } else {
      await finishWordGameIfNeeded();
      onNext();
    }
  };
  const prevSentence = () => {
    if (si<=0) return;
    setSi(si-1);
    setPool([]);
    setSel(null);
    setPhraseMode(false);
    resetPhraseDraft();
    setCardQueue([]);
    resetCardRound();
  };

  const d = sel ? getData(sel) : null;
  const selectedInTeacherVocab = !!(sel && unit.vocab?.[sel]);
  /* fetchWordForce: 캐시 무시하고 Gemini에서 강제 재조회 */
  const fetchWordForce = async (word) => {
    if (!allowAiLookup) return;
    const keyToUse = apiKey || askForGeminiKey(apiKey, onChangeKey);
    if (!keyToUse) return;
    setLoading(true);
    try {
      const parsed = await callGeminiJSON(
        keyToUse,
        `영어 단어 "${word}"의 정보를 아래 JSON으로만 반환하라(마크다운/설명 없이).
- word는 "${word}"로 쓴다(원형 변환 없이 그대로).
- meanings는 가능한 한글 뜻을 자연스러운 한국어로 최대 4개까지 나열한다.
- 한국 학생 중2-고3 수준에서 이해 가능한 쉬운 영어 유의어와 반의어를 우선한다.
- 유의어와 반의어는 가능한 경우 최대 4개까지, 없으면 있는 수만 배열한다.
{"words":[{"word":"${word}","meanings":["뜻1"],"syn":["..."],"ant":["..."]}]}`,
        700,
        VOCAB_RESPONSE_SCHEMA
      );
      const found = normalizeCandidatePayload(parsed)[0];
      const normalized = normalizeVocabData(
        found ? { ko:found.meanings.join(", "), syn:found.syn, ant:found.ant } : parsed
      );
      setCache(prev => ({ ...prev, [word]: normalized }));
      setCachedWord(word, normalized);
    } catch(e) {
      setCache(prev => ({ ...prev, [word]: { ko:"(Gemini에서 뜻을 불러오지 못했습니다)", syn:[], ant:[] } }));
    } finally { setLoading(false); }
  };

  const applyWordEdit = async () => {
    const raw = wordEdit.trim();
    if (!raw) { alert("수정할 단어를 입력하세요."); return; }
    /* 교사가 직접 입력한 단어는 재-lemmatize 하지 않음.
       cleanWordToken(소문자화 + 알파벳만)만 적용해 의도를 그대로 보존. */
    const next = raw.toLowerCase().replace(/['']/g,"'").replace(/'s$/,"").replace(/[^a-z]/g,"");
    if (!next) { alert("수정할 단어를 입력하세요."); return; }
    if (next.includes(" ")) { alert("단어 수정은 한 단어만 가능합니다. 표현은 표현 묶기를 사용하세요."); return; }
    if (next === sel) {
      /* 단어는 같지만 뜻을 강제 재조회하고 싶을 때도 여기서 처리 */
      await fetchWordForce(next);
      return;
    }
    const old = sel;
    const oldData = old ? getData(old) : null;
    setPool(prev => {
      const replaced = prev.map(k => k === old ? next : k);
      return replaced.includes(next) ? [...new Set(replaced)] : [...replaced, next];
    });
    setSel(next);
    setWordEdit(next);
    /* 기존 데이터를 새 key로 이동(캐시 재활용 없음 — 잘못된 데이터 방지) */
    setCache(prev => {
      const copy = { ...prev };
      if (old && !unit.vocab?.[old]) delete copy[old];
      return copy;
    });
    setSavedNotice(`${old} → ${next} 수정됨`);
    /* 교사가 고친 단어는 항상 Gemini에서 새로 불러옴 */
    await fetchWordForce(next);
  };
  const saveableKo = String(d?.ko || "").trim();
  const canSaveSelected = !!(
    canSaveVocab &&
    onSaveVocab &&
    sel &&
    d &&
    !loading &&
    !selectedInTeacherVocab &&
    saveableKo &&
    !saveableKo.startsWith("(")
  );
  const saveSelectedVocab = () => {
    if (!canSaveSelected) return;
    const ok = onSaveVocab(unit.id, sel, d);
    setSavedNotice(ok ? `${sel} 저장됨` : "저장 실패");
  };

  return (
    <div>
      <SecTitle icon="BookOpen" sub={`${teacherSetupMode ? "TEACHER" : "STEP 3"} · ${si+1}/${unit.englishSentences.length}`}>단어 게임</SecTitle>
      <p style={{ fontSize:"13px", color:C.muted, marginBottom:"12px" }}>
        {teacherSetupMode
          ? "문장 속 단어를 탭해 교사용 단어장에 저장하고, 필요한 경우 두 단어 이상을 표현으로 묶으세요."
          : "모르는 단어를 탭 → 단어장에 추가 → 선택하면 뜻·유의어·반의어가 나타납니다"}
      </p>
      <div style={{ display:"flex", alignItems:"flex-start", gap:"8px", marginBottom:"16px" }}>
        <button onClick={()=>speak(sent,"en-US")} style={{ flexShrink:0, padding:"6px", borderRadius:"999px",
          background:C.coralLight, border:"none", cursor:"pointer", marginTop:"2px" }}>
          <Icon name="Volume2" size={15} color={C.coral}/>
        </button>
        <p style={{ fontSize:"16px", lineHeight:"1.7", margin:0 }}>
          {tokens.map((w,i)=>{
            const k = lookupKey(w,i);
            const inVocab = !!unit.vocab[k];
            return (
              <span key={i} onClick={()=>tapWord(w,i)} style={{ cursor:"pointer", borderRadius:"2px", padding:"0 1px",
                borderBottom:inVocab?`2px dotted ${C.teal}`:"2px dotted transparent",
                background:pool.includes(k)?C.tealLight:"transparent" }}>{w} </span>

          })}
        </p>
      </div>
      {pool.length>0 && (
        <div style={{ marginBottom:"16px" }}>
          <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between",
                        gap:"8px", marginBottom:"6px", flexWrap:"wrap" }}>
            <p style={{ fontSize:"12px", fontWeight:600, color:C.muted, margin:0 }}>
              {teacherSetupMode ? "교사용 단어장" : "내 단어장"}
            </p>
            {canSaveVocab && (
              <div style={{ display:"flex", gap:"6px", flexWrap:"wrap" }}>
                <button onClick={phraseMode ? stopPhraseMode : startPhraseMode}

                    background:phraseMode?C.gold:"#fff", color:phraseMode?"#fff":C.ink,
                    cursor:"pointer" }}>
                  {phraseMode ? "표현 묶기 취소" : "표현 묶기"}
                </button>
                {phraseMode && (
                  <button onClick={resetPhraseDraft}

            )}
          </div>
          <div style={{ display:"flex", flexWrap:"wrap", gap:"8px" }}>
            {pool.map(k=>{
              const phraseIndex = phraseParts.indexOf(k);
              const isPart = phraseIndex >= 0;
              const isPhrase = !!(unit.vocab?.[k]?.type === "phrase" || k.includes(" "));
              return (

            <Btn primary onClick={applyWordEdit} disabled={loading}>

          {sel && d && !loading && (

              <button onClick={loadSelectedPhraseForEdit}

                  borderRadius:"999px", background:"#fff", color:C.gold, border:`1px solid ${C.gold}88`,
                  cursor:"pointer", fontSize:"12px", fontWeight:700, flexShrink:0 }}>

              </button>
            )}
            {canSaveSelected && (
              <button onClick={saveSelectedVocab}
                style={{ display:"inline-flex", alignItems:"center", gap:"6px", padding:"7px 12px",
                  borderRadius:"999px", background:C.teal, color:"#fff", border:"none",
                  cursor:"pointer", fontSize:"12px", fontWeight:700, flexShrink:0 }}>
                <Icon name="Save" size={13} color="#fff"/>교사 단어장에 저장
              </button>
            )}
          </div>
          {savedNotice && (
            <p style={{ margin:"-4px 0 10px", color:C.teal, fontSize:"12px", fontWeight:700 }}>
              {savedNotice}
            </p>
          )}
          {d.type === "phrase" && Array.isArray(d.parts) && d.parts.length > 0 && (
            <p style={{ margin:"-2px 0 10px", color:C.muted, fontSize:"12px" }}>
              구성: {d.parts.join(" + ")}
            </p>
          )}
          {d.note && (
            <p style={{ margin:"-2px 0 10px", color:C.muted, fontSize:"12px" }}>
              메모: {d.note}
            </p>
          )}
          {[["유의어",d.syn,C.teal,C.tealLight],["반의어",d.ant,C.coral,C.coralLight]].map(([lbl,words,col,bg])=>(
            <div key={lbl} style={{ marginBottom:"8px" }}>
              <span style={{ fontSize:"11px", fontWeight:700, color:col }}>{lbl}</span>
              <div style={{ display:"flex", flexWrap:"wrap", gap:"6px", marginTop:"4px" }}>
                {(words||[]).filter(Boolean).length===0
                  ? <span style={{ fontSize:"12px", color:C.muted }}>—</span>
                  : (words||[]).filter(Boolean).map(w=>(
                    <button key={w} onClick={()=>speak(w,"en-US")}
                      style={{ padding:"4px 10px", borderRadius:"8px", fontSize:"13px", cursor:"pointer",
                               background:bg, color:col, border:"none",
                               display:"inline-flex", alignItems:"center", gap:"4px" }}>
                      <Icon name="Volume2" size={11} color={col}/>{w}
                    </button>
                  ))}
              </div>
            </div>
          ))}
        </div>
      )}

      {needsCardGame && (
        <div style={{ borderRadius:"16px", padding:"14px", marginBottom:"16px",
          background:"#fff8e5", border:`1px solid ${C.gold}55` }}>
          <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center",
            gap:"8px", flexWrap:"wrap", marginBottom:"10px" }}>
            <div>
              <p style={{ margin:0, fontSize:"12px", fontWeight:800, color:C.gold }}>문장별 단어 카드</p>
              <p style={{ margin:"3px 0 0", fontSize:"12px", color:C.muted }}>
                문장마다 최대 4개 단어의 뜻을 확인합니다.
              </p>
            </div>
            <span style={{ fontSize:"12px", color:C.gold, fontWeight:800 }}>
              {cardQueue.length ? `${cardIndex+1}/${cardQueue.length}` : "출제 단어 없음"}

          </div>
          {!cardQueue.length ? (
            <p style={{ margin:0, fontSize:"13px", color:C.muted }}>
              이 문장에는 교사 단어장에 저장된 출제 단어가 없습니다. 단어를 확인한 뒤 다음 문장으로 이동하세요.

}

/* ── Step 4 ── */
function GameStep4({ unit, speak, onPrev, onRestart, assignment=null, startedAt=null, wordGameSummary=null, onAssignmentComplete=null }) {
  const [si, setSi]         = useState(0);
  const [arranged, setArr]  = useState([]);
  const [bank, setBank]     = useState(()=>shuffleArr(unit.koreanChunks[0]||[]));
  const [status, setStatus] = useState(null);
  const [results, setResults] = useState([]);
  const [checkedThisSentence, setCheckedThisSentence] = useState(false);
  const [done, setDone]     = useState(false);
  const [saveStatus, setSaveStatus] = useState("");
  const savedRef = useRef(false);
  const answer = unit.koreanChunks[si]||[];

  const pick = (c,i) => { if(status==="correct") return; setArr(a=>[...a,c]); setBank(b=>b.filter((_,j)=>j!==i)); setStatus(null); };
  const undo = () => {
    if (!arranged.length||status==="correct") return;
    const last = arranged[arranged.length-1];
    setArr(a=>a.slice(0,-1)); setBank(b=>[...b,last]); setStatus(null);
  };
  const check = async () => {
    const ok = arranged.length===answer.length && arranged.every((c,i)=>c===answer[i]);
    setStatus(ok?"correct":"wrong");
    if (!checkedThisSentence) {
      setResults(r => {
        const next = [...r];
        next[si] = ok;
        return next;
      });
      setCheckedThisSentence(true);
    }
    await speak(ok?"정답이에요":"오답이에요. 다시 시도하세요","ko-KR");
  };
  const retry = () => { setArr([]); setBank(shuffleArr(answer)); setStatus(null); };
  const nextSent = () => {
    if (si<unit.koreanChunks.length-1) {
      const ni=si+1; setSi(ni); setArr([]); setBank(shuffleArr(unit.koreanChunks[ni]||[])); setStatus(null); setCheckedThisSentence(false);
    } else setDone(true);
  };

  useEffect(() => {
    if (!done || savedRef.current || !onAssignmentComplete) return;
    savedRef.current = true;
    const total = unit.koreanChunks.length || 0;
    const correct = results.filter(Boolean).length;
    const score = total ? Math.round((correct/total)*100) : 0;
    const startedMs = startedAt ? new Date(startedAt).getTime() : Date.now();
    const duration = Math.max(0, Math.round((Date.now() - startedMs) / 1000));
    setSaveStatus("과제 기록 저장 중...");
    onAssignmentComplete({
      started_at:startedAt,
      duration_seconds:duration,
      score,
      total_items:total,
      correct_first_try:correct,
      raw:{ results, word_game:wordGameSummary }
    }).then(()=>setSaveStatus("과제 기록 저장 완료"))
      .catch(e=>{ savedRef.current=false; setSaveStatus(`과제 기록 저장 실패: ${e.message}`); });
  }, [done]);

  if (done) {
    const total=unit.koreanChunks.length, correct=results.filter(Boolean).length;
    const score=Math.round((correct/total)*100);
    const tone = scoreTone(score);
    return (
      <div style={{ textAlign:"center", padding:"32px 0" }}>
        <Icon name="Sparkles" size={38} color={C.coral} style={{ marginBottom:"12px" }}/>
        <h2 style={{ fontSize:"22px", fontWeight:700, margin:"0 0 4px" }}>학습 완료!</h2>
        <p style={{ fontSize:"13px", color:C.muted, marginBottom:"20px" }}>{unit.title}</p>
        <div style={{ display:"inline-block", borderRadius:"20px", padding:"24px 40px", marginBottom:"24px",
          background:tone.bg, color:tone.color }}>
          <p style={{ fontSize:"13px", opacity:0.8, margin:0 }}>성공률</p>
          <p style={{ fontSize:"48px", fontWeight:700, margin:"4px 0" }}>{score}%</p>
          <p style={{ fontSize:"12px", opacity:0.8, margin:0 }}>{total}문장 중 첫 시도 {correct}문장 정답</p>
        </div>
        {assignment && <p style={{ margin:"-12px 0 18px", color:C.muted, fontSize:"13px" }}>{saveStatus}</p>}
        <div>
          <Btn primary onClick={onRestart}><Icon name="RotateCcw" size={15} color="#fff"/>처음부터 다시</Btn>
        </div>
      </div>
    );
  }

  return (
    <div>
      <SecTitle icon="ListOrdered" sub={`STEP 4 · ${si+1}/${unit.koreanChunks.length}`}>직독직해 배열 게임</SecTitle>
      <div style={{ display:"flex", alignItems:"flex-start", gap:"8px", marginBottom:"12px" }}>
        <button onClick={()=>speak(unit.englishSentences[si],"en-US")}
          style={{ flexShrink:0, padding:"6px", borderRadius:"999px", background:C.coralLight, border:"none", cursor:"pointer", marginTop:"2px" }}>
          <Icon name="Volume2" size={15} color={C.coral}/>
        </button>
        <p style={{ fontSize:"16px", fontWeight:600, lineHeight:"1.7", margin:0 }}>{unit.englishSentences[si]}</p>
      </div>
      <p style={{ fontSize:"13px", color:C.muted, marginBottom:"12px" }}>의미 단위 조각을 순서대로 탭해 한글 해석을 완성하세요.</p>

      {/* 배열 영역 */}
      <div style={{ minHeight:"52px", borderRadius:"14px", padding:"10px 12px", marginBottom:"12px",
        display:"flex", flexWrap:"wrap", gap:"6px", alignItems:"center",
        background:status==="correct"?C.tealLight:status==="wrong"?C.coralLight:C.cream,
        border:`1px dashed ${status==="wrong"?C.coral:"#cfc6b5"}` }}>
        {!arranged.length && <span style={{ fontSize:"13px", color:"#b3ac9e" }}>여기에 순서대로 배열됩니다</span>}
        {arranged.map((c,i)=>(
          <span key={i} style={{ padding:"5px 12px", borderRadius:"10px", fontSize:"13px", fontWeight:500,
            background:C.paper, border:`1px solid ${C.border}` }}>{c}</span>
        ))}
      </div>

      {/* 조각 은행 */}
      <div style={{ display:"flex", flexWrap:"wrap", gap:"8px", marginBottom:"16px" }}>
        {bank.map((c,i)=>(
          <button key={i} onClick={()=>pick(c,i)}
            style={{ padding:"8px 14px", borderRadius:"10px", fontSize:"13px", fontWeight:600,
                     background:C.teal, color:"#fff", border:"none", cursor:"pointer" }}>{c}</button>
        ))}
      </div>

      {status==="correct" && (
        <p style={{ display:"flex", alignItems:"center", gap:"6px", fontSize:"13px", fontWeight:600, color:C.teal, marginBottom:"12px" }}>
          <Icon name="Check" size={15} color={C.teal}/>정답이에요!
        </p>
      )}
      {status==="wrong" && (
        <p style={{ display:"flex", alignItems:"center", gap:"6px", fontSize:"13px", fontWeight:600, color:C.coral, marginBottom:"12px" }}>
          <Icon name="X" size={15} color={C.coral}/>오답이에요. 다시 시도하세요.
        </p>
      )}

      <div style={{ display:"flex", gap:"8px", flexWrap:"wrap" }}>
        <Btn onClick={onPrev}>이전 단계</Btn>
        {status!=="correct" && <Btn onClick={undo} disabled={!arranged.length}><Icon name="RotateCcw" size={13} color={C.ink}/>되돌리기</Btn>}
        {status==="wrong"   && <Btn onClick={retry}>다시 풀기</Btn>}
        {status!=="correct" && <Btn primary onClick={check} disabled={bank.length>0}><Icon name="Check" size={15} color="#fff"/>정답 확인</Btn>}
        {status==="correct" && (
          <Btn primary onClick={nextSent}>
            {si<unit.koreanChunks.length-1?<>다음 문장<Icon name="ArrowRight" size={15} color="#fff"/></>:<>결과 보기<Icon name="ArrowRight" size={15} color="#fff"/></>}
          </Btn>
        )}
      </div>
    </div>
  );
}

/* ── 유틸 ── */
function shuffleArr(arr) {
  const a=[...arr];
  for (let i=a.length-1;i>0;i--) { const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; }
  return a;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
<script>
if ("serviceWorker" in navigator && location.protocol.startsWith("http")) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("./service-worker.js").catch(() => {});
  });
}
</script>
