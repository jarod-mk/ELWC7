/* ── TTS ── */
/* ════════════════════════════════════════
   모바일 음성 잠금 해제 (전역 1회)
   - 모바일은 첫 사용자 제스처에서 speak()가 직접 호출돼야 음성 엔진이 켜짐
   - 첫 탭/터치/클릭/키 입력 시 무음 발화로 엔진을 깨움(warmup)
════════════════════════════════════════ */
let __ttsUnlocked = false;
function unlockTTS() {
  if (__ttsUnlocked) return;
  const synth = window.speechSynthesis;
  if (!synth || !window.SpeechSynthesisUtterance) return;
  try {
    synth.cancel();
    const u = new SpeechSynthesisUtterance(" ");
    u.volume = 0;          // 무음
    u.rate = 2;
    synth.speak(u);
    synth.resume && synth.resume();
    __ttsUnlocked = true;
  } catch (e) {}
}
if (typeof window !== "undefined") {
  ["pointerdown", "touchend", "mousedown", "keydown"].forEach(ev =>
    window.addEventListener(ev, unlockTTS, { passive: true })
  );
  // 음성 목록 미리 로드 트리거
  if (window.speechSynthesis) {
    window.speechSynthesis.getVoices();
    window.speechSynthesis.onvoiceschanged = () => window.speechSynthesis.getVoices();
  }
}

/* 모바일 여부 판별 */
const IS_MOBILE = typeof navigator !== "undefined" &&
  /Android|iPhone|iPad|iPod|Mobile/i.test(navigator.userAgent);

function useTTS() {
  const vRef = useRef([]);
  const loadVoicesRef = useRef(null);
  const runRef = useRef(0);
  useEffect(() => {
    const load = () => { vRef.current = window.speechSynthesis?.getVoices() || []; };
    loadVoicesRef.current = load;
    load();
    const synth = window.speechSynthesis;
    if (synth?.addEventListener) synth.addEventListener("voiceschanged", load);
    else if (synth) synth.onvoiceschanged = load;
    return () => {
      if (synth?.removeEventListener) synth.removeEventListener("voiceschanged", load);
      else if (synth?.onvoiceschanged === load) synth.onvoiceschanged = null;
    };
  }, []);
  const canSpeak = () => !!(window.speechSynthesis && window.SpeechSynthesisUtterance);

  /* 음성 목록을 비동기로 확보 (모바일은 처음에 빈 배열) */
  const ensureVoices = () => new Promise(resolve => {
    const synth = window.speechSynthesis;
    if (!synth) { resolve([]); return; }
    let v = synth.getVoices();
    if (v && v.length) { vRef.current = v; resolve(v); return; }
    let settled = false;
    const finish = () => {
      if (settled) return;
      settled = true;
      const got = synth.getVoices() || [];
      vRef.current = got;
      resolve(got);
    };
    synth.addEventListener?.("voiceschanged", finish, { once: true });
    setTimeout(finish, 1000);   // 최대 1초 대기 후 진행(있는 만큼)
  });

  const pickVoice = (lang, voices=vRef.current) => {
    const vs = voices.filter(v => v.lang?.startsWith(lang));
    const fem = ["female","여성","yuna","sora","heami","한국의","google","samantha","zira","us english"];
    return vs.find(v => fem.some(h => v.name.toLowerCase().includes(h))) || vs[0];
  };
  const makeUtterance = (text, lang, onStart, onFinish, voices=vRef.current) => {
    const u = new SpeechSynthesisUtterance(text);
    u.lang = lang;
    u.rate = lang.startsWith("ko") ? 0.95 : 0.9;
    u.volume = 1;
    const v = pickVoice(lang.slice(0,2), voices);
    if (v) u.voice = v;     // 못 찾으면 voice 미지정 → lang 기본 음성 사용(모바일에서 더 안전)
    u.onstart = () => onStart?.();
    u.onend = () => onFinish?.(true);
    u.onerror = () => onFinish?.(false);
    return u;
  };
  const speakLine = (text, lang="en-US", onStart=null, runId=++runRef.current) => new Promise(res => {
    const clean = String(text || "").trim();
    if (!clean || !canSpeak()) { res(false); return; }
    const synth = window.speechSynthesis;
    const voices = vRef.current;
    if (runId !== runRef.current) { res(false); return; }
    let done = false;
    const finish = (ok=true) => {
      if (done) return;
      done = true;
      clearTimeout(timer);
      clearInterval(keepAlive);
      res(ok);
    };
    const timer = setTimeout(()=>finish(false), Math.min(Math.max(clean.length * 160, 4000), 25000));
    // 데스크톱 Chrome 15초 끊김 방지용 resume — 모바일에선 덜 공격적으로
    const keepAlive = IS_MOBILE ? null : setInterval(()=>{ try{synth.resume?.();}catch(e){} }, 5000);
    try {
      synth.speak(makeUtterance(clean, lang, onStart, finish, voices));
    } catch(e) {
      finish(false);
    }
  });
  const speak = async (text, lang="en-US") => {
    if (!canSpeak()) return false;
    await ensureVoices();
    const runId = ++runRef.current;
    window.speechSynthesis.cancel();
    // cancel 직후 바로 speak하면 모바일에서 누락될 수 있어 짧은 지연
    await new Promise(r=>setTimeout(r, IS_MOBILE ? 60 : 0));
    return speakLine(text, lang, null, runId);
  };
  const speakAll = async (lines, lang="en-US", onActive=()=>{}) => {
    const clean = (Array.isArray(lines) ? lines : [lines]).map(s=>String(s || "").trim()).filter(Boolean);
    if (!clean.length) return true;
    if (!canSpeak()) return false;
    await ensureVoices();
    const synth = window.speechSynthesis;
    const runId = ++runRef.current;
    synth.cancel();
    await new Promise(r=>setTimeout(r, IS_MOBILE ? 60 : 0));
    let started = false;
    for (let i=0; i<clean.length; i++) {
      if (runId !== runRef.current) break;
      const ok = await speakLine(clean[i], lang, () => { started = true; onActive(i); }, runId);
      if (!ok && !started) {
        onActive(-1);
        return false;
      }
      await new Promise(r=>setTimeout(r, 150));
    }
    onActive(-1);
    return started;
  };
  const stop = () => {
    runRef.current++;
    window.speechSynthesis?.cancel();
  };
  return { speak, speakAll, stop };
}

function cleanJsonText(text) {
  const stripped = (text || "").replace(/```json|```/g, "").trim();
  const first = stripped.indexOf("{");
  const last = stripped.lastIndexOf("}");
  return first >= 0 && last >= first ? stripped.slice(first, last + 1) : stripped;
}

function sleep(ms) {
  return new Promise(res => setTimeout(res, ms));
}

async function callGeminiJSON(apiKey, prompt, maxOutputTokens=800, responseSchema=null) {
  if (!apiKey) throw new Error("NO_GEMINI_KEY");
  let lastErr = null;
  for (let attempt=0; attempt<2; attempt++) {
    try {
      const generationConfig = {
        temperature:0.15,
        maxOutputTokens,
        responseMimeType:"application/json"
      };
      if (responseSchema && !(attempt === 1 && lastErr?.status === 400)) {
        generationConfig.responseSchema = responseSchema;
      }

      const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${GEMINI_MODEL}:generateContent`, {
        method:"POST",
        headers:{
          "Content-Type":"application/json",
          "x-goog-api-key": apiKey
        },
        body: JSON.stringify({
          contents:[{ parts:[{ text: prompt }] }],
          generationConfig
        })
      });
      const data = await res.json();
      if (!res.ok) {
        const err = new Error(data?.error?.message || "Gemini API 오류");
        err.status = res.status;
        throw err;
      }
      const text = (data.candidates || [])
        .flatMap(c => c.content?.parts || [])
        .map(p => p.text || "")
        .join("");
      return JSON.parse(cleanJsonText(text));
    } catch(e) {
      lastErr = e;
      if (responseSchema && e.status === 400 && attempt === 0) {
        await sleep(500);
        continue;
      }
      if (e.status && e.status < 500 && e.status !== 429) break;
      if (attempt === 0) await sleep(800);
    }
  }
  throw lastErr;
}

function askForGeminiKey(currentKey, onChangeKey) {

}

  "news","series","species","means","physics","mathematics","economics","politics",
  "ethics","gymnastics","headquarters","crossroads","analysis","basis","crisis",
  "thesis","class","glass","grass","pass","this","ourselves","yourselves","themselves",
  "ours","hers"
]);

const DOUBLE_CONSONANT = /([bcdfghjklmnpqrstvwxyz])\1$/;

const FINAL_E_VERB_BASES = new Set([
  "achieve","admire","agree","argue","arrive","assume","attune","base","believe","care",
  "cause","change","close","compare","confuse","continue","create","dance","decide",
  "decrease","describe","desire","encourage","ensure","experience","explore","face",
  "force","free","imagine","improve","include","increase","influence","inspire",
  "introduce","like","live","love","locate","manage","measure","move","notice","organize",
  "place","please","practice","prepare","produce","provide","raise","realize","receive",
  "recognize","reduce","refuse","relate","remove","require","save","separate","share",
  "rehearse","solve","state","translate","use","value"
]);

const MISSING_FINAL_E_FIXES = {
  achiev:"achieve", admir:"admire", agre:"agree", argu:"argue", arriv:"arrive",
  assum:"assume", attun:"attune", attuned:"attune", bias:"bias", biase:"bias", biased:"bias",
  believ:"believe", caus:"cause", chang:"change", clos:"close",
  compar:"compare", confus:"confuse", continu:"continue", creat:"create",
  decid:"decide", decreas:"decrease", describ:"describe", desir:"desire",
  encourag:"encourage", ensur:"ensure", experienc:"experience", explor:"explore",
  fac:"face", forc:"force", imagin:"imagine", improv:"improve", includ:"include",
  increas:"increase", influenc:"influence", inspir:"inspire", introduc:"introduce",
  lik:"like", liv:"live", lov:"love", manag:"manage", measur:"measure",
  mov:"move", notic:"notice", organiz:"organize", plac:"place", pleas:"please",
  practic:"practice", prepar:"prepare", produc:"produce", provid:"provide",
  rais:"raise", realiz:"realize", receiv:"receive", recogniz:"recognize",
  reduc:"reduce", refus:"refuse", rehears:"rehearse", relat:"relate", remov:"remove", requir:"require",
  sav:"save", separat:"separate", shar:"share", solv:"solve", stat:"state",
  translat:"translate", valu:"value", ourselve:"ourselves", yourselve:"yourselves",
  themselve:"themselves"
};

function cleanWordToken(word) {
  return (word || "")
    .toLowerCase()
    .replace(/[’']/g, "'")
    .replace(/'s$/,"")
    .replace(/[^a-z]/g,"");
}

function tokenizeEnglishWords(sentence) {
  return (String(sentence || "").match(/[A-Za-z]+(?:[’'][A-Za-z]+)?/g) || [])
    .map(s => s.trim())
    .filter(Boolean);
}

function wordFormCandidates(word) {
  const w = cleanWordToken(word);
  const candidates = [];
  const add = v => { if (v && !candidates.includes(v)) candidates.push(v); };
  if (!w) return candidates;

  add(IRREGULAR_VERBS[w]);
  add(IRREGULAR_NOUNS[w]);
  add(MISSING_FINAL_E_FIXES[w]);

  if (w.endsWith("ies") && w.length > 4) add(w.slice(0,-3) + "y");
  if (w.endsWith("ied") && w.length > 4) add(w.slice(0,-3) + "y");

  if (w.endsWith("ing") && w.length > 4) {
    const stem = w.slice(0,-3);
    const finalE = stem + "e";
    const likelyFinalE =
      FINAL_E_VERB_BASES.has(finalE) ||
      MISSING_FINAL_E_FIXES[stem] ||
      (!DOUBLE_CONSONANT.test(stem) && /(ac|ag|ak|am|as|at|az|cid|clos|duc|fus|giv|ir|iv|iz|lov|ov|quir|rais|rs|ud|us)$/.test(stem));
    if (likelyFinalE) add(MISSING_FINAL_E_FIXES[stem] || finalE);
    if (DOUBLE_CONSONANT.test(stem)) add(stem.slice(0,-1));
    add(stem);
    add(finalE);
  }

  if (w.endsWith("ed") && w.length > 4) {
    const stem = w.slice(0,-2);
    if (DOUBLE_CONSONANT.test(stem)) add(stem.slice(0,-1));
    const finalE = w.slice(0,-1);
    const likelyFinalE =
      FINAL_E_VERB_BASES.has(finalE) ||
      (!DOUBLE_CONSONANT.test(stem) && /(ated|eted|oted|ced|ved|ued|ged|sed|zed|ired|ured)$/.test(w));
    if (likelyFinalE) add(finalE);
    add(stem);
    add(finalE);
  }

  if (!KEEP_FINAL_S.has(w)) {
    if (/(ches|shes|sses|xes|zes|oes)$/.test(w) && w.length > 4) add(w.slice(0,-2));
    if (w.endsWith("s") && !w.endsWith("ss") && !w.endsWith("us") && !w.endsWith("is") && w.length > 3) add(w.slice(0,-1));
  }

  add(w);
  return candidates;
}

const NOUN_CONTEXT_WORDS = new Set(["my","your","his","her","its","our","their","the","these","those","many","several","few","some","all","both"]);

function normalizeWordForLookup(word, vocab={}, cache={}, context={}) {
  const w = cleanWordToken(word);
  const prev = cleanWordToken(context.prev);
  if (w === "lives" || w === "leaves") {
    const nounKey = w === "lives" ? "life" : "leaf";
    const verbKey = w === "lives" ? "live" : "leave";
    const candidates = NOUN_CONTEXT_WORDS.has(prev)
      ? [nounKey, verbKey, w]
      : [verbKey, nounKey, w];
    return candidates.find(k => vocab[k] || cache[k]) || candidates[0];
  }
  const directFix = MISSING_FINAL_E_FIXES[w] || IRREGULAR_VERBS[w] || IRREGULAR_NOUNS[w];
  if (directFix) return directFix;
  const candidates = wordFormCandidates(word);
  return candidates.find(k => vocab[k] || cache[k]) || candidates[0] || "";
}

function normalizeVocabKey(word) {
  const raw = String(word || "").trim().replace(/\s+/g, " ");
  if (!raw) return "";
  if (raw.includes(" ")) return raw.toLowerCase();
  return normalizeWordForLookup(raw);
}

function normalizeVocabData(data={}) {
  const limit = arr => Array.isArray(arr) ? arr.map(v => String(v).trim()).filter(Boolean).slice(0,4) : [];
  const meanings = limit(data.meanings || (data.ko ? [data.ko] : []));
  const out = {
    ko: data.ko || meanings.join(", "),
    syn: limit(data.syn),
    ant: limit(data.ant)
  };
  if (data.type) out.type = String(data.type);
  if (Array.isArray(data.parts)) out.parts = data.parts.map(v => String(v).trim()).filter(Boolean);
  if (data.note) out.note = String(data.note).trim();
  return out;
}

function firstMeaning(data={}) {
  const raw = String(data.ko || "").split(/[,;/·]| 또는 | 혹은 /).map(s=>s.trim()).filter(Boolean);
  return raw[0] || String(data.ko || "").trim();
}

function vocabEntriesForSentence(unit, sentence, cache={}) {
  const tokens = tokenizeEnglishWords(sentence);
  const seen = new Set();
  return tokens.map((w,i) => normalizeWordForLookup(w, unit.vocab, cache, { prev:tokens[i-1], next:tokens[i+1] }))
    .filter(k => {
      if (!k || seen.has(k)) return false;
      seen.add(k);
      const data = unit.vocab?.[k] || cache?.[k];
      return !!firstMeaning(data);
    });
}

function makeMeaningChoices(unit, correctKey, cache={}) {
  const correct = firstMeaning(unit.vocab?.[correctKey] || cache?.[correctKey]);
  const meanings = Object.entries(unit.vocab || {})
    .filter(([k]) => k !== correctKey)
    .map(([,data]) => firstMeaning(data))
    .filter(Boolean);
  const extras = ["영향을 주다","필요로 하다","연습하다","발전하다","연결","가능한","중요한","결과","원인","비교하다"]
    .filter(m => m !== correct);
  return shuffleArr([correct, ...shuffleArr([...new Set([...meanings, ...extras])]).slice(0,5)]).slice(0,6);
}

function normalizeVocabPayload(payload={}) {
  return Object.entries(payload || {}).reduce((acc,[word,data]) => {
    const key = normalizeVocabKey(word);
    if (key) acc[key] = normalizeVocabData(data);
    return acc;
  }, {});
}

function normalizeCandidateData(data={}) {
  const limit = arr => Array.isArray(arr) ? arr.map(v => String(v).trim()).filter(Boolean).slice(0,4) : [];
  return {
    meanings: limit(data.meanings || (data.ko ? [data.ko] : [])),
    syn: limit(data.syn),
    ant: limit(data.ant)
  };
}

function normalizeCandidatePayload(payload={}) {
  const raw = Array.isArray(payload.words)
    ? payload.words
    : Object.entries(payload || {}).map(([word,data]) => ({ word, ...data }));
  return raw.map(item => {
    const word = normalizeWordForLookup(item.word);
    const data = normalizeCandidateData(item);
    return word ? {
      word,
      ...data,
      selected:{ meanings:[], syn:[], ant:[] }
    } : null;
  }).filter(Boolean);
}

function readWordCache() {
  try {
    const raw = JSON.parse(localStorage.getItem(WORD_CACHE_KEY) || "{}");
    return normalizeVocabPayload(raw);
  }
  catch(e) { return {}; }
}

function writeWordCache(cache) {
  try { localStorage.setItem(WORD_CACHE_KEY, JSON.stringify(cache)); }
  catch(e) {}
}

function getCachedWord(word) {
  const key = normalizeVocabKey(word);
  const cache = readWordCache();
  return cache[key] || cache[word] || null;
}

function setCachedWord(word, data) {
  const key = normalizeVocabKey(word);
  if (!key) return;
  const cache = readWordCache();
  cache[key] = normalizeVocabData(data);
  if (word && word !== key) delete cache[word];
  writeWordCache(cache);
}

function getUrlParam(name) {
  try {
    const hash = window.location.hash?.replace(/^#/,"") || "";
    const hashParams = new URLSearchParams(hash);
    const queryParams = new URLSearchParams(window.location.search || "");
    return hashParams.get(name) || queryParams.get(name) || "";
  } catch(e) {
    return "";
  }
}

function isStudentSharedMode() {
  return getUrlParam("mode") === "student";
}

function isTeacherAppMode() {

function createSupabaseClient() {
  if (!window.supabase?.createClient) return null;
  return window.supabase.createClient(SUPABASE_URL, SUPABASE_PUBLISHABLE_KEY, {
    auth:{ persistSession:true, autoRefreshToken:true }
  });
}

async function callSupabaseFunction(name, body, options={}) {
  const headers = {
    "Content-Type":"application/json",
    "apikey":SUPABASE_PUBLISHABLE_KEY,
    ...options.headers
  };
  if (options.accessToken) headers.Authorization = `Bearer ${options.accessToken}`;
  if (options.studentToken) headers["x-student-token"] = options.studentToken;
  const res = await fetch(`${SUPABASE_URL}/functions/v1/${name}`, {
    method:"POST",
    headers,
    body:JSON.stringify(body || {})
  });
  const data = await res.json().catch(()=>({}));
  if (!res.ok || data.error) throw new Error(data.error || `Function ${name} failed`);
  return data;
}

async function callTeacherAdmin(action, payload={}) {
  const client = createSupabaseClient();
  if (!client) throw new Error("Supabase SDK를 불러오지 못했습니다.");
  const { data } = await client.auth.getSession();
  const token = data.session?.access_token;
  if (!token) throw new Error("TEACHER_LOGIN_REQUIRED");
  return callSupabaseFunction(TEACHER_ADMIN_FUNCTION, { action, ...payload }, { accessToken:token });
}

async function callStudentApi(action, payload={}, token="") {

}

function readStudentSession() {

    if (!saved?.session_token || !saved?.student) return null;
    if (saved.expires_at && new Date(saved.expires_at).getTime() < Date.now()) return null;

}

  else localStorage.setItem(STUDENT_SESSION_KEY, JSON.stringify(session));

function formatDateInputValue(date=new Date()) {
  const d = new Date(date.getTime() - date.getTimezoneOffset()*60000);
  return d.toISOString().slice(0,16);
}

function toLocalDateKey(value) {
  const d = value ? new Date(value) : new Date();
  const local = new Date(d.getTime() - d.getTimezoneOffset()*60000);
  return local.toISOString().slice(0,10);
}

function getMonday(date=new Date()) {
  const d = new Date(date);
  d.setHours(0,0,0,0);
  const day = d.getDay();
  d.setDate(d.getDate() - ((day + 6) % 7));
  return d;
}

function addDays(date, days) {
  const d = new Date(date);
  d.setDate(d.getDate() + days);
  return d;
}

function getWeekDays(base=new Date()) {
  const monday = getMonday(base);
  return Array.from({ length:7 }, (_,i)=>addDays(monday,i));
}

function getMonthDays(base=new Date()) {
  const d = new Date(base);
  const first = new Date(d.getFullYear(), d.getMonth(), 1);
  const last = new Date(d.getFullYear(), d.getMonth()+1, 0);
  return Array.from({ length:last.getDate() }, (_,i)=>new Date(d.getFullYear(), d.getMonth(), i+1));
}

function scoreTone(score) {
  const n = Number(score || 0);
  if (n >= 90) return { bg:"#d7f0ec", color:"#0f766e", label:"우수" };
  if (n >= 70) return { bg:"#dbeafe", color:"#2563eb", label:"양호" };
  return { bg:"#fef3c7", color:"#a16207", label:"보완" };
}

function resultStatusText(result) {
  if (!result) return "미완료";
  return result.is_late || result.status === "late_completed" ? "지각 완료" : "완료";
}

function formatMinutes(seconds) {
  const n = Math.max(0, Number(seconds || 0));
  if (n < 60) return `${n}초`;
  return `${Math.round(n/60)}분`;
}

function assignmentState(assignment, result=null) {
  if (result) {
    const tone = scoreTone(result.score);
    return { key:result.is_late ? "late_completed" : "completed", label:resultStatusText(result), bg:tone.bg, color:tone.color };
  }
  const due = assignment?.due_at ? new Date(assignment.due_at) : null;
  const now = new Date();
  if (due && now > due) return { key:"overdue", label:"마감 지남 · 지각 가능", bg:"#fef3c7", color:"#a16207" };
  if (due && toLocalDateKey(due) === toLocalDateKey(now)) return { key:"due_today", label:"오늘 마감", bg:"#fde7e2", color:C.coral };
  if (due && toLocalDateKey(due) === toLocalDateKey(addDays(now,1))) return { key:"due_tomorrow", label:"내일 마감", bg:"#dbeafe", color:"#2563eb" };
  return { key:"incomplete", label:"미완료", bg:C.cream, color:C.muted };
}

function getAssignmentResultMap(results=[]) {
  return Object.fromEntries((results || []).map(r=>[`${r.student_id || ""}:${r.assignment_id}`, r]));
}

function getIncompleteRows(data) {
  const students = (data.students || []).filter(s=>s.active);
  const assignments = (data.assignments || []).filter(a=>a.active);
  const targets = data.targets || [];
  const resultMap = getAssignmentResultMap(data.results || []);
  const rows = [];
  for (const target of targets) {
    const student = students.find(s=>s.id===target.student_id);
    const assignment = assignments.find(a=>a.id===target.assignment_id);
    if (!student || !assignment) continue;
    const result = resultMap[`${student.id}:${assignment.id}`];
    if (result) continue;
    rows.push({
      student,
      assignment,
      state:assignmentState(assignment, null)
    });
  }
  rows.sort((a,b)=>new Date(a.assignment.due_at || "2999-12-31") - new Date(b.assignment.due_at || "2999-12-31"));
  return rows;
}

function makeStudentAppUrl(classroomId) {

}

function makeTeacherAppUrl(classroomId) {

    : "index.html";

function makeReminderMessage(row, classroomId) {

  return `[MK-WC 과제 알림]\n${row.student.student_code} ${row.student.display_name || ""} 학생\n${row.assignment.title} 과제가 아직 미완료입니다.\n마감: ${due}\n학생 링크: ${makeStudentAppUrl(classroomId)}`;
}

async function copyText(text) {
  if (navigator.clipboard?.writeText) {
    await navigator.clipboard.writeText(text);
    return true;
  }
  const ta = document.createElement("textarea");
  ta.value = text;
  document.body.appendChild(ta);
  ta.select();
  const ok = document.execCommand("copy");
  ta.remove();
  return ok;
}

async function shareReminderText(text, title="MK-WC 과제 알림") {
  if (navigator.share) {
    await navigator.share({ title, text });
    return "shared";
  }
  await copyText(text);
  return "copied";
}

function urlBase64ToUint8Array(base64String) {
  const padding = "=".repeat((4 - base64String.length % 4) % 4);
  const base64 = (base64String + padding).replace(/-/g, "+").replace(/_/g, "/");
  const raw = window.atob(base64);
  return Uint8Array.from([...raw].map(ch => ch.charCodeAt(0)));
}

/* ════════════════════════════════════════
   AutoTextarea
   · 최소 minRows ~ 최대 maxRows 자동 높이 확장
   · 한글 IME 조합 완전 지원 (onCompositionStart/End)
     - 조합 중 React re-render 간섭 없음
     - HWP 복붙, 직접 입력 모두 정상 동작
   · 외부 value 변경(자동배치 등)은 useEffect로 DOM 직접 동기화
════════════════════════════════════════ */
/* ════════════════════════════════════════
   SectionCard — 접기/펼치기 카드 (UnitForm 밖에 정의해야
   매 입력마다 재생성되지 않아 내부 입력칸 포커스가 유지됨)
════════════════════════════════════════ */
function SectionCard({ lbl, ttl, sub, color, isOpen, onToggle, children }) {
  return (
    <div style={{ borderRadius:"14px", overflow:"hidden", border:`1px solid ${C.darkBorder}` }}>
      <div onClick={onToggle} style={{ width:"100%", display:"flex", alignItems:"center", gap:"12px",
        padding:"12px 16px", background:C.darkCard, cursor:"pointer", textAlign:"left",
        userSelect:"none", WebkitUserSelect:"none" }}>
        <span style={{ fontSize:"11px", fontWeight:700, padding:"2px 8px", borderRadius:"999px",
          background:`${color}22`, color, flexShrink:0 }}>{lbl}</span>
        <div style={{ flex:1, minWidth:0 }}>
          <p style={{ fontWeight:600, fontSize:"14px", color:C.darkText, margin:0 }}>{ttl}</p>
          <p style={{ fontSize:"11px", color:"#7b7468", margin:0 }}>{sub}</p>
        </div>
        <Icon name={isOpen?"ChevronUp":"ChevronDown"} size={16} color="#7b7468"/>
      </div>
      {isOpen && <div style={{ padding:"14px 16px", background:"#fffdf8" }}>{children}</div>}
    </div>
  );
}

function AutoTextarea({ value, onChange, placeholder, minRows=2, maxRows=5, style={}, className="" }) {
  const ref         = useRef(null);
  const composingRef = useRef(false);   // 한글 IME 조합 중 여부
  // controlled value: 화면에 실제로 보이는 값. 조합 중에는 이 로컬 상태만 갱신.
  const [local, setLocal] = useState(value);

  // 부모 value 가 외부 요인(자동배치 버튼 등)으로 바뀌면 로컬에 반영.
  // 단, 사용자가 IME 조합 중일 때는 덮어쓰지 않음(글자 깨짐/커서 점프 방지).
  useEffect(() => {
    if (!composingRef.current && value !== local) {
      setLocal(value);
    }
  }, [value]);

  // 높이 자동 조절 — local(보이는 값) 변할 때마다
  useEffect(() => {
    const el = ref.current;
    if (!el) return;
    el.style.height = "auto";
    const cs   = getComputedStyle(el);
    const lh   = parseFloat(cs.lineHeight) || 22;
    const padV = parseFloat(cs.paddingTop) + parseFloat(cs.paddingBottom);
    const minH = lh * minRows + padV;
    const maxH = lh * maxRows + padV;
    el.style.height    = Math.min(Math.max(el.scrollHeight, minH), maxH) + "px";
    el.style.overflowY = el.scrollHeight > maxH ? "auto" : "hidden";
  }, [local, minRows, maxRows]);

  const handleChange = (e) => {
    const v = e.target.value;
    setLocal(v);                       // 화면은 항상 즉시 갱신 (커서 위치 React가 보존)
    if (!composingRef.current) {
      onChange(v);                     // 조합 중이 아니면 부모에도 전달
    }
  };

  return (
    <textarea
      ref={ref}
      value={local}                    /* controlled: 커서 위치 React가 자동 관리 */
      onChange={handleChange}
      placeholder={placeholder}
      rows={minRows}
      className={"w-full rounded-lg px-3 py-2 text-sm outline-none resize-none " + className}
      style={{ lineHeight:"1.6", ...style }}

      /* ── 한글 IME 조합 처리 ── */
      onCompositionStart={() => { composingRef.current = true; }}
      onCompositionEnd={(e) => {
        composingRef.current = false;
        const v = e.target.value;
        setLocal(v);
        onChange(v);                   /* 조합 완료 시점에 부모로 최종 확정값 전달 */
      }}

      /* ── 키/클릭 이벤트가 카드 헤더로 전파되지 않도록 차단 ── */
      onKeyDown={(e) => { e.stopPropagation(); }}
      onKeyUp={(e)   => { e.stopPropagation(); }}
      onClick={(e)   => { e.stopPropagation(); }}
    />
  );
}

  return (
    <button onClick={onClick} disabled={disabled}

               display:"inline-flex", alignItems:"center", gap:"6px",
               padding:"8px 16px", borderRadius:"12px", fontSize:"14px", fontWeight:600 }}>

/* ════════════════════════════════════════
   APP
════════════════════════════════════════ */
function App() {
  const studentOnly = isStudentSharedMode();
  const teacherOnly = isTeacherAppMode();
  const [view, setView]     = useState(studentOnly ? "student" : teacherOnly ? "teacher" : "home");
  const [units, setUnits]   = useState(()=>readSavedUnits());
  const [editUnit, setEditUnit] = useState(null);
  const [selUnit, setSelUnit]   = useState(null);
  const [apiKey, setApiKey]   = useState(() => localStorage.getItem("gemini_key") || "");
  const [classroomId, setClassroomState] = useState(()=>getClassroomId());
  const [syncStatus, setSyncStatus] = useState("Supabase 연결 준비");
  const [teacherEmail, setTeacherEmail] = useState("");
  const [studentSession, setStudentSession] = useState(()=>readStudentSession());
  const [selAssignment, setSelAssignment] = useState(null);
  const [studentLoginMode, setStudentLoginMode] = useState(studentOnly);
  const importRef = useRef(null);
  const supabaseRef = useRef(null);
  const { speak, speakAll, stop } = useTTS();

  useEffect(() => { writeSavedUnits(units); }, [units]);

  useEffect(() => {
    const client = createSupabaseClient();
    supabaseRef.current = client;
    if (!client) {
      setSyncStatus("Supabase SDK 로드 실패");
      return;
    }
    let active = true;
    let channel = null;
    client.auth.getUser().then(({ data }) => {
      if (active) setTeacherEmail(data.user?.email || "");
    });
    const { data:authListener } = client.auth.onAuthStateChange((_event, session) => {
      if (active) setTeacherEmail(session?.user?.email || "");
    });

    const loadRemote = async () => {
      setSyncStatus(`교실 ${classroomId} 불러오는 중`);
      const { data, error } = await client
        .from("quiz_sets")
        .select("units,updated_at")
        .eq("classroom_id", classroomId)
        .maybeSingle();
      if (!active) return;
      if (error) {
        setSyncStatus("Supabase 불러오기 실패");
        return;
      }
      if (data?.units) {
        const next = normalizeImportedUnits(data.units);
        setUnits(next);
        if (selUnit) setSelUnit(prev => prev ? next.find(u=>u.id===prev.id) || null : null);
      }
      setSyncStatus(data?.updated_at ? `실시간 연결됨 · ${new Date(data.updated_at).toLocaleTimeString()}` : "실시간 연결됨 · 아직 저장 없음");
    };

    loadRemote();
    channel = client
      .channel(`quiz_sets:${classroomId}`)
      .on("postgres_changes", {
        event:"*",
        schema:"public",
        table:"quiz_sets",
        filter:`classroom_id=eq.${classroomId}`
      }, payload => {
        if (payload.new?.units) {
          const next = normalizeImportedUnits(payload.new.units);
          setUnits(next);
          setSelUnit(prev => prev ? next.find(u=>u.id===prev.id) || null : null);
          setSyncStatus(`실시간 반영됨 · ${new Date().toLocaleTimeString()}`);
        }
      })
      .subscribe(status => {
        if (status === "SUBSCRIBED") setSyncStatus(`실시간 연결됨 · 교실 ${classroomId}`);
        if (status === "CHANNEL_ERROR") setSyncStatus("실시간 연결 오류");
      });

    return () => {
      active = false;
      if (channel) client.removeChannel(channel);
      authListener.subscription?.unsubscribe();
    };
  }, [classroomId]);

  const saveKey = (k) => {
    const trimmed = k.trim();
    setApiKey(trimmed);
    if (trimmed) localStorage.setItem("gemini_key", trimmed);
    else localStorage.removeItem("gemini_key");
  };

  const ensureTeacherUser = async () => {
    const client = supabaseRef.current || createSupabaseClient();
    if (!client) throw new Error("Supabase SDK를 불러오지 못했습니다.");
    supabaseRef.current = client;

    const current = await client.auth.getUser();
    if (current.data.user) return current.data.user;

    const email = window.prompt("교사 계정 이메일을 입력하세요.");
    if (!email) return null;
    const password = window.prompt("교사 계정 비밀번호를 입력하세요. 계정이 없으면 같은 정보로 가입을 시도합니다.");
    if (!password) return null;

    let { data, error } = await client.auth.signInWithPassword({ email:email.trim(), password });
    if (error) {
      const create = window.confirm("로그인에 실패했습니다. 이 이메일로 새 교사 계정을 만들까요?");
      if (!create) throw error;
      ({ data, error } = await client.auth.signUp({ email:email.trim(), password }));
      if (error) throw error;
      if (!data.session) {
        alert("가입 확인 메일을 보냈습니다. 이메일 인증 후 다시 저장하세요.");
        return null;
      }
    }
    setTeacherEmail(data.user?.email || "");
    return data.user;
  };

  const signOutTeacher = async () => {
    const client = supabaseRef.current || createSupabaseClient();
    if (!client) return;
    await client.auth.signOut();
    setTeacherEmail("");
    setSyncStatus("교사 로그아웃됨");
  };

  const syncUnitsToSupabase = async (nextUnits) => {
    setSyncStatus("Supabase 저장 준비");
    try {
      const client = supabaseRef.current || createSupabaseClient();
      if (!client) throw new Error("Supabase SDK를 불러오지 못했습니다.");
      supabaseRef.current = client;
      const user = await ensureTeacherUser();
      if (!user) {
        setSyncStatus("Supabase 저장 대기 · 교사 로그인 필요");
        return;
      }
      setSyncStatus("Supabase 저장 중");
      const { error } = await client
        .from("quiz_sets")
        .upsert({
          classroom_id: classroomId,
          owner_id: user.id,
          units: nextUnits,
          updated_at: new Date().toISOString()
        }, { onConflict:"classroom_id" });
      if (error) throw error;
      setSyncStatus(`Supabase 저장됨 · ${new Date().toLocaleTimeString()}`);
    } catch(e) {
      setSyncStatus("Supabase 저장 실패");
      alert("Supabase 저장 실패: " + (e.message || "로그인, 권한, 네트워크 상태를 확인하세요."));
    }
  };

  const updateUnits = (updater, shouldSync=true) => {
    const next = typeof updater === "function" ? updater(units) : updater;
    setUnits(next);
    if (shouldSync && !studentOnly) syncUnitsToSupabase(next);
    return next;
  };

  const saveUnit = u => {
    updateUnits(prev => prev.find(x=>x.id===u.id) ? prev.map(x=>x.id===u.id?u:x) : [...prev,u]);
    setEditUnit(null);
  };

  const saveGameVocab = (unitId, word, data, replaceWord="") => {
    if (studentOnly) return false;
    const key = normalizeVocabKey(word);
    const replaceKey = normalizeVocabKey(replaceWord);
    if (!key || !data) return false;
    const normalized = normalizeVocabData(data);
    let savedUnit = null;
    const nextUnits = updateUnits(prev => prev.map(u => {
      if (u.id !== unitId) return u;
      const nextVocab = { ...(u.vocab || {}) };
      if (replaceKey && replaceKey !== key) delete nextVocab[replaceKey];
      nextVocab[key] = normalized;
      savedUnit = {
        ...u,
        vocab: nextVocab
      };
      return savedUnit;
    }));
    if (!savedUnit && nextUnits.length) return false;
    if (selUnit?.id === unitId && savedUnit) setSelUnit(savedUnit);
    return true;
  };

  const deleteUnit = id => updateUnits(prev=>prev.filter(x=>x.id!==id));

  const exportUnits = async () => {
    const payload = {
      app:"MK-WC 영어 단어 독해 게임",
      version:1,
      exportedAt:new Date().toISOString(),
      units
    };
    const json = JSON.stringify(payload,null,2);
    const blob = new Blob([json], { type:"application/json" });
    const file = new File([blob], "mk-wc-game-data.json", { type:"application/json" });
    if (navigator.canShare?.({ files:[file] })) {
      try {
        await navigator.share({ title:"MK-WC 게임 데이터", text:"MK-WC 영어 게임 지문 데이터", files:[file] });
        return;
      } catch(e) {}
    }
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = "mk-wc-game-data.json";
    document.body.appendChild(a);
    a.click();
    a.remove();
    URL.revokeObjectURL(url);
  };

  const configureClassroom = () => {
    const nextId = window.prompt("교실 ID를 입력하세요. Supabase 저장과 불러오기에 같이 사용됩니다.", classroomId);
    if (nextId === null) return;
    const cleanId = setClassroomId(nextId);
    setClassroomState(cleanId);
  };

  const importUnits = e => {
    const file = e.target.files?.[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = () => {
      try {
        const parsed = JSON.parse(reader.result);
        const nextUnits = normalizeImportedUnits(parsed.units || parsed);
        if (!nextUnits.length) throw new Error("EMPTY");
        const mode = window.confirm("가져온 지문으로 현재 목록을 교체할까요?\n확인: 교체 / 취소: 기존 목록 뒤에 추가");
        const merged = mode ? nextUnits : [...units, ...nextUnits];
        updateUnits(merged);
        setEditUnit(null);
        setSelUnit(null);
        alert("지문 데이터를 가져왔습니다.");
      } catch(err) {
        alert("가져오기 실패: 올바른 MK-WC JSON 파일인지 확인하세요.");
      } finally {
        e.target.value = "";
      }
    };
    reader.readAsText(file);
  };

  if (view==="home") return <HomeScreen
    onTeacher={()=>setView("teacher")}
    onStudent={()=>{ setStudentLoginMode(true); setView("student"); }} />;
  if (view==="teacher") return (
    <>
    <input ref={importRef} className="hidden-file-input" type="file" accept="application/json,.json" onChange={importUnits}/>
    <TeacherMode units={units} editUnit={editUnit}
      onEdit={u=>setEditUnit(u)}
      onNew={()=>setEditUnit({id:Date.now().toString(),title:"",koreanFull:[],englishSentences:[],koreanChunks:[],vocab:{}})}
      onSave={saveUnit} onDelete={deleteUnit} onCancelEdit={()=>setEditUnit(null)}
      onExport={exportUnits} onImport={()=>importRef.current?.click()}
      classroomId={classroomId} syncStatus={syncStatus} onConfigureClassroom={configureClassroom}
      teacherEmail={teacherEmail} onTeacherLogin={ensureTeacherUser} onTeacherLogout={signOutTeacher}
      onHome={()=>{stop();setView(teacherOnly ? "teacher" : "home");}} apiKey={apiKey} onChangeKey={saveKey}
      speak={speak} onSaveVocab={saveGameVocab} />
    </>
  );
  if (view==="student") return (
    <StudentMode units={units} selected={selUnit}
      selectedAssignment={selAssignment}
      studentSession={studentSession}
      onStudentSession={s=>{ setStudentSession(s); writeStudentSession(s); }}
      onSelect={(u,a=null)=>{ setSelUnit(u); setSelAssignment(a); }} onBack={()=>{setSelUnit(null);setSelAssignment(null);}}
      onHome={()=>{stop();setSelUnit(null);setSelAssignment(null);setStudentLoginMode(studentOnly);setView(studentOnly ? "student" : "home");}} speak={speak} speakAll={speakAll} stop={stop}
      apiKey={apiKey} onChangeKey={saveKey} syncStatus={syncStatus} classroomId={classroomId}
      studentLoginMode={studentLoginMode}
      allowAiLookup={false} canSaveVocab={false} onSaveVocab={saveGameVocab} />
  );
}

function TeacherLoginCard({ onLogin, classroomId }) {
  return (
    <div style={{ marginBottom:"12px", padding:"16px", borderRadius:"16px",

function TeacherClassroomTools({ tab, units, classroomId, teacherEmail, onTeacherLogin }) {
  const [data, setData] = useState({ students:[], assignments:[], targets:[], results:[], step_progress:[], word_game_attempts:[], student_word_logs:[], reminder_logs:[], push_subscriptions:[] });
  const [loading, setLoading] = useState(false);
  const [msg, setMsg] = useState("");
  const [selectedStudentId, setSelectedStudentId] = useState("");

  const refresh = async () => {
    setLoading(true);
    try {
      if (!teacherEmail) await onTeacherLogin();
      const next = await callTeacherAdmin("overview", { classroom_id:classroomId });
      setData(next);
      setMsg(`관리 데이터 동기화됨 · ${new Date().toLocaleTimeString()}`);
      if (!selectedStudentId && next.students?.[0]) setSelectedStudentId(next.students[0].id);
    } catch(e) {
      setMsg(e.message === "TEACHER_LOGIN_REQUIRED"
        ? "교사 로그인 후 사용할 수 있습니다."
        : `관리 기능 연결 실패: ${e.message}`);
    } finally {
      setLoading(false);
    }
  };

  useEffect(() => { refresh(); }, [classroomId, tab]);
  useEffect(() => {
    const client = createSupabaseClient();
    if (!client) return;
    const channel = client
      .channel(`assignment-results:${classroomId}`)
      .on("postgres_changes", { event:"*", schema:"public", table:"assignment_results", filter:`classroom_id=eq.${classroomId}` }, () => refresh())
      .on("postgres_changes", { event:"*", schema:"public", table:"assignment_step_progress", filter:`classroom_id=eq.${classroomId}` }, () => refresh())
      .on("postgres_changes", { event:"*", schema:"public", table:"word_game_attempts", filter:`classroom_id=eq.${classroomId}` }, () => refresh())
      .on("postgres_changes", { event:"*", schema:"public", table:"student_word_logs", filter:`classroom_id=eq.${classroomId}` }, () => refresh())
      .on("postgres_changes", { event:"*", schema:"public", table:"reminder_logs", filter:`classroom_id=eq.${classroomId}` }, () => refresh())
      .subscribe();
    return () => { client.removeChannel(channel); };
  }, [classroomId]);

  const run = async (fn, doneMsg) => {
    setLoading(true);
    try {
      if (!teacherEmail) await onTeacherLogin();
      const res = await fn();
      setMsg(doneMsg || "처리 완료");
      await refresh();
      return res;
    } catch(e) {
      setMsg(`처리 실패: ${e.message}`);
      alert(`처리 실패: ${e.message}`);
    } finally {
      setLoading(false);
    }
  };

  return (
    <div style={{ display:"flex", flexDirection:"column", gap:"12px" }}>
      <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", gap:"8px",
        padding:"10px 12px", borderRadius:"12px", background:"#fffdf8", border:`1px solid ${C.darkBorder}` }}>
        <span style={{ color:"#7b7468", fontSize:"12px" }}>{loading ? "불러오는 중..." : msg || "학생/과제/성과 관리 준비"}</span>
        <button onClick={refresh} style={{ padding:"6px 10px", borderRadius:"8px", border:`1px solid ${C.darkBorder}`,
          background:C.darkCard, color:C.darkText, cursor:"pointer", fontSize:"12px", fontWeight:700 }}>새로고침</button>
      </div>
      {tab==="students" && <TeacherStudentsPanel data={data} classroomId={classroomId} run={run}/>}
      {tab==="assignments" && <TeacherAssignmentsPanel data={data} units={units} classroomId={classroomId} run={run}/>}
      {tab==="performance" && <TeacherPerformancePanel data={data} selectedStudentId={selectedStudentId} onSelectStudent={setSelectedStudentId}/>}
      {tab==="reminders" && <TeacherRemindersPanel data={data} classroomId={classroomId} run={run}/>}
    </div>
  );
}

function TeacherStudentsPanel({ data, classroomId, run }) {
  const students = data.students || [];
  const createStudent = () => {
    const name = window.prompt("학생 이름을 입력하세요. 비워두면 아이디와 같은 이름으로 생성됩니다.", "");
    if (name === null) return;
    run(async () => {
      const res = await callTeacherAdmin("createStudent", { classroom_id:classroomId, display_name:name });
      alert(`${res.student.student_code} 생성 완료\nPIN: ${res.pin}\n\nPIN은 앞자리 0을 포함한 4자리 그대로 전달하세요.`);
      return res;
    }, "학생 생성 완료");
  };
  const resetPin = student => run(async () => {
    const res = await callTeacherAdmin("resetPin", { classroom_id:classroomId, student_id:student.id });
    alert(`${student.student_code} 새 PIN: ${res.pin}\n\n이전 PIN은 더 이상 사용할 수 없습니다.`);
    return res;
  }, "PIN 초기화 완료");
  const setActive = student => run(
    () => callTeacherAdmin("setStudentActive", { classroom_id:classroomId, student_id:student.id, active:!student.active }),
    "학생 상태 변경 완료"
  );
  const deleteStudent = student => {
    const label = `${student.student_code} · ${student.display_name || "이름 없음"}`;
    if (!window.confirm(`${label} 학생을 삭제할까요?\n\n삭제하면 이 학생의 로그인 세션, 과제 배정, 수행 기록도 함께 삭제됩니다.`)) return;
    run(
      () => callTeacherAdmin("deleteStudent", { classroom_id:classroomId, student_id:student.id }),
      "학생 삭제 완료"
    );
  };

  return (
    <div style={{ background:C.darkCard, border:`1px solid ${C.darkBorder}`, borderRadius:"14px", padding:"14px" }}>
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", gap:"10px", marginBottom:"12px" }}>
        <div>
          <h3 style={{ fontSize:"16px", margin:"0 0 4px" }}>학생 관리</h3>
          <p style={{ fontSize:"12px", color:"#7b7468", margin:0 }}>아이디는 s001부터 자동 생성되고 PIN은 4자리로 발급됩니다.</p>
        </div>
        <button onClick={createStudent} style={{ display:"inline-flex", alignItems:"center", gap:"6px", padding:"8px 12px",
          borderRadius:"10px", background:C.teal, color:"#fff", border:"none", cursor:"pointer", fontSize:"13px", fontWeight:700 }}>
          <Icon name="Plus" size={14} color="#fff"/>학생 추가
        </button>
      </div>
      {!students.length ? <p style={{ color:"#7b7468", fontSize:"13px" }}>아직 학생이 없습니다.</p> : (
        <div style={{ display:"flex", flexDirection:"column", gap:"8px" }}>
          {students.map(s=>(
            <div key={s.id} style={{ display:"flex", alignItems:"center", justifyContent:"space-between", gap:"10px",
              padding:"10px 12px", borderRadius:"10px", background:"#fffdf8", border:`1px solid ${C.darkBorder}` }}>
              <div>
                <p style={{ margin:0, fontWeight:700, color:C.darkText }}>{s.student_code} · {s.display_name || "이름 없음"}</p>
                <p style={{ margin:"2px 0 0", fontSize:"11px", color:s.active?C.teal:"#7b7468" }}>{s.active ? "활성" : "비활성"}</p>
              </div>
              <div style={{ display:"flex", gap:"6px", flexWrap:"wrap", justifyContent:"flex-end" }}>
                <button onClick={()=>resetPin(s)} style={darkMiniBtn()}>PIN 초기화</button>
                <button onClick={()=>setActive(s)} style={darkMiniBtn()}>{s.active ? "비활성화" : "활성화"}</button>
                <button onClick={()=>deleteStudent(s)}
                  style={{ ...darkMiniBtn(), color:C.coral, border:`1px solid ${C.coralLight}` }}>
                  <Icon name="Trash2" size={13} color={C.coral}/>삭제
                </button>
              </div>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

function TeacherAssignmentsPanel({ data, units, classroomId, run }) {
  const [unitId, setUnitId] = useState(units[0]?.id || "");
  const [title, setTitle] = useState(units[0]?.title || "");
  const [startAt, setStartAt] = useState(formatDateInputValue(new Date()));
  const [dueAt, setDueAt] = useState(formatDateInputValue(addDays(new Date(), 7)));
  const [selectedStudentIds, setSelectedStudentIds] = useState([]);
  const assignments = data.assignments || [];
  const students = (data.students || []).filter(s=>s.active);

  useEffect(() => {
    const u = units.find(x=>x.id===unitId);
    if (u && !title) setTitle(u.title);
  }, [unitId]);

  const createAssignment = (studentIds=[]) => {
    if (!unitId) { alert("과제로 낼 지문을 선택하세요."); return; }
    const unit = units.find(u=>u.id===unitId);
    run(() => callTeacherAdmin("createAssignment", {
      classroom_id:classroomId,
      unit_id:unitId,
      title:title.trim() || unit?.title || "과제",
      start_at:startAt ? new Date(startAt).toISOString() : null,
      due_at:dueAt ? new Date(dueAt).toISOString() : null,
      student_ids:studentIds
    }), studentIds.length ? "개인별 과제 생성 완료" : "반 전체 과제 생성 완료");
  };
  const createPersonalAssignment = () => {
    if (!students.length) { alert("활성 학생이 없습니다. 학생을 먼저 추가하세요."); return; }
    if (!selectedStudentIds.length) { alert("개인별 과제를 받을 학생을 선택하세요."); return; }
    createAssignment(selectedStudentIds);
  };
  const toggleStudent = id => {
    setSelectedStudentIds(prev => prev.includes(id) ? prev.filter(x=>x!==id) : [...prev, id]);
  };

  const setAssignmentActive = a => run(
    () => callTeacherAdmin("setAssignmentActive", { classroom_id:classroomId, assignment_id:a.id, active:!a.active }),
    "과제 상태 변경 완료"
  );

  return (
    <div style={{ display:"flex", flexDirection:"column", gap:"12px" }}>
      <div style={{ background:C.darkCard, border:`1px solid ${C.darkBorder}`, borderRadius:"14px", padding:"14px" }}>
        <h3 style={{ fontSize:"16px", margin:"0 0 12px" }}>과제 만들기</h3>
        <div style={{ display:"grid", gap:"10px" }}>
          <select value={unitId} onChange={e=>{ setUnitId(e.target.value); const u=units.find(x=>x.id===e.target.value); setTitle(u?.title || ""); }}
            style={darkInputStyle()}>
            {units.map(u=><option key={u.id} value={u.id}>{u.title || "(제목 없음)"}</option>)}
          </select>
          <input value={title} onChange={e=>setTitle(e.target.value)} placeholder="과제명" style={darkInputStyle()}/>
          <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:"8px" }}>
            <label style={darkLabelStyle()}>시작 날짜/시간<input type="datetime-local" value={startAt} onChange={e=>setStartAt(e.target.value)} style={darkInputStyle({ marginTop:"4px" })}/></label>
            <label style={darkLabelStyle()}>마감 날짜/시간<input type="datetime-local" value={dueAt} onChange={e=>setDueAt(e.target.value)} style={darkInputStyle({ marginTop:"4px" })}/></label>
          </div>
          <button onClick={()=>createAssignment([])} style={{ padding:"10px 14px", borderRadius:"10px", background:C.teal,
            color:"#fff", border:"none", cursor:"pointer", fontWeight:700 }}>반 전체 과제로 등록</button>
          <div style={{ borderRadius:"12px", border:`1px solid ${C.darkBorder}`, background:"#fffdf8", padding:"12px" }}>
            <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", gap:"8px", marginBottom:"8px", flexWrap:"wrap" }}>
              <div>
                <p style={{ margin:0, fontSize:"13px", fontWeight:800, color:C.darkText }}>학생 개인별 과제 등록</p>
                <p style={{ margin:"2px 0 0", fontSize:"11px", color:"#7b7468" }}>선택한 학생에게만 같은 과제를 배정합니다.</p>
              </div>
              <button onClick={()=>setSelectedStudentIds(students.map(s=>s.id))}
                disabled={!students.length}
                style={darkMiniBtn()}>전체 선택</button>
            </div>
            {!students.length ? (
              <p style={{ color:"#7b7468", fontSize:"13px", margin:0 }}>활성 학생이 없습니다.</p>
            ) : (
              <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fit, minmax(120px, 1fr))", gap:"7px", marginBottom:"10px" }}>
                {students.map(s=>(
                  <label key={s.id} style={{ display:"flex", alignItems:"center", gap:"7px", padding:"8px 9px",
                    borderRadius:"10px", border:`1px solid ${selectedStudentIds.includes(s.id)?C.teal:C.darkBorder}`,

        <h3 style={{ fontSize:"16px", margin:"0 0 12px" }}>과제 목록</h3>

              </div>
            ))}
          </div>
        )}
      </div>
    </div>
  );

}

function StepProgressOverview({ data }) {
  const students = data.students || [];
  const assignments = (data.assignments || []).filter(a=>a.active !== false).slice(0, 6);
  const steps = data.step_progress || [];
  const results = data.results || [];
  const stepMap = steps.reduce((acc,s)=>{
    acc[`${s.assignment_id}:${s.student_id}:${s.step_no}`] = s;
    return acc;
  }, {});
  const resultMap = results.reduce((acc,r)=>{
    acc[`${r.assignment_id}:${r.student_id}`] = r;
    return acc;
  }, {});
  const stepBadge = (assignmentId, studentId, stepNo) => {
    const s = stepMap[`${assignmentId}:${studentId}:${stepNo}`];
    if (!s?.is_completed) return { label:"미완료", bg:C.cream, color:C.muted };
    if (stepNo === 3 && Number.isFinite(Number(s.score))) return scoreTone(Number(s.score));
    return { label:"완료", bg:C.tealLight, color:C.teal };
  };
  const stepLabel = (assignmentId, studentId, stepNo) => {
    const s = stepMap[`${assignmentId}:${studentId}:${stepNo}`];
    if (!s?.is_completed) return "미완료";
    if (stepNo === 3 && s.score !== null && s.score !== undefined) return `${s.score}%`;
    return "완료";
  };
  if (!students.length || !assignments.length) return (
    <div style={{ background:C.darkCard, border:`1px solid ${C.darkBorder}`, borderRadius:"14px", padding:"14px" }}>
      <h3 style={{ margin:"0 0 6px", fontSize:"16px" }}>단계별 학습 현황</h3>
      <p style={{ margin:0, color:"#7b7468", fontSize:"13px" }}>학생과 과제가 생성되면 듣기/단어게임 완료 현황이 표시됩니다.</p>
    </div>
  );
  return (
    <div style={{ background:C.darkCard, border:`1px solid ${C.darkBorder}`, borderRadius:"14px", padding:"14px" }}>
      <h3 style={{ margin:"0 0 6px", fontSize:"16px" }}>단계별 학습 현황</h3>
      <p style={{ margin:"0 0 12px", color:"#7b7468", fontSize:"12px" }}>1단계·2단계는 끝까지 들은 경우만 완료, 3단계는 단어 카드 정답률입니다.</p>
      <div style={{ overflowX:"auto" }}>
        <div style={{ minWidth:"860px", display:"grid", gap:"8px" }}>
          {assignments.map(a=>(
            <div key={a.id} style={{ borderRadius:"12px", border:`1px solid ${C.darkBorder}`, background:"#fffdf8", padding:"10px" }}>
              <p style={{ margin:"0 0 8px", fontWeight:800, color:C.darkText }}>{a.title}</p>
              <div style={{ display:"grid", gridTemplateColumns:"120px repeat(4, minmax(90px, 1fr))", gap:"6px", marginBottom:"6px" }}>
                {["학생","해석듣기","영어듣기","단어게임","독해배열"].map(h=>(
                  <span key={h} style={{ fontSize:"11px", color:"#7b7468", fontWeight:800 }}>{h}</span>
                ))}
              </div>
              {students.map(st=>{
                const result = resultMap[`${a.id}:${st.id}`];
                const readingTone = result ? scoreTone(result.score) : { bg:C.cream, color:C.muted };
                return (
                  <div key={st.id} style={{ display:"grid", gridTemplateColumns:"120px repeat(4, minmax(90px, 1fr))", gap:"6px", alignItems:"center", marginBottom:"5px" }}>
                    <span style={{ fontSize:"12px", fontWeight:800, color:C.darkText }}>{st.student_code}</span>
                    {[1,2,3].map(stepNo=>{
                      const tone = stepBadge(a.id, st.id, stepNo);
                      return <span key={stepNo} style={{ padding:"5px 7px", borderRadius:"999px", background:tone.bg, color:tone.color, fontSize:"11px", fontWeight:800, textAlign:"center" }}>{stepLabel(a.id, st.id, stepNo)}</span>;
                    })}
                    <span style={{ padding:"5px 7px", borderRadius:"999px", background:readingTone.bg, color:readingTone.color, fontSize:"11px", fontWeight:800, textAlign:"center" }}>
                      {result ? `${result.score}%` : "미완료"}
                    </span>
                  </div>
                );
              })}
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

function ResultBadge({ result, prefix="", compact=false }) {
  const tone = scoreTone(result.score);
  const label = compact ? `${shortTitle(result.title)} ${result.is_late ? "지각" : "완료"}` : `${prefix ? prefix + " · " : ""}${shortTitle(result.title)} · ${formatMinutes(result.duration_seconds)} · ${result.score}%`;
  return (
    <div title={`${result.title} · ${resultStatusText(result)} · 성공률 ${result.score}%`}
      style={{ marginBottom:"5px", padding:"5px 6px", borderRadius:"8px", background:tone.bg, color:tone.color,
        fontSize:compact?"10px":"11px", fontWeight:800, lineHeight:1.35, overflow:"hidden", textOverflow:"ellipsis" }}>
      {label}
    </div>
  );
}

   UnitForm – 4칸 폼
